name: Update Portal Data

on:
  schedule:
    - cron: '0 6 * * *'   # 6 AM UTC daily (midnight CST)
  workflow_dispatch:        # manual trigger button on GitHub Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Run update script
        env:
          SQUARE_ACCESS_TOKEN: ${{ secrets.SQUARE_ACCESS_TOKEN }}
          SQUARE_LOCATION: ${{ secrets.SQUARE_LOCATION }}
        run: python scripts/update_portal_data.py --api-only

      - name: Commit if changed
        run: |
          git config user.name "GBC Portal Bot"
          git config user.email "portal-bot@gbckc.com"
          git add data/partners.json partner-portal-v2.html
          git diff --staged --quiet || git commit -m "Auto-update portal data — $(date +'%Y-%m-%d')"
          git push
