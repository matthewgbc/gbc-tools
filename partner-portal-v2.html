<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GBC Partner Portal v2</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0d0d0d;--surface:#161616;--surface2:#1e1e1e;--surface3:#262626;
  --border:#2a2a2a;--border2:#333;
  --amber:#e07c24;--amber-dim:#7a4010;--amber-glow:rgba(224,124,36,.12);
  --green:#22c55e;--green-dim:#14532d;
  --red:#ef4444;--red-dim:#7f1d1d;
  --yellow:#eab308;--yellow-dim:#713f12;
  --blue:#3b82f6;--blue-dim:#1e3a8a;
  --purple:#a855f7;--purple-dim:#4a1772;
  --grey:#6b7280;--grey-dim:#1f2937;
  --text:#f5f5f5;--text-muted:#737373;--text-dim:#404040;
  --sidebar-w:240px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;}
a{color:var(--amber);text-decoration:none;}
a:hover{text-decoration:underline;}
button{font-family:inherit;cursor:pointer;}

/* ─── SIDEBAR ─── */
#sidebar{
  width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;overflow-y:auto;
}
#sidebar::-webkit-scrollbar{width:3px;}
#sidebar::-webkit-scrollbar-thumb{background:var(--border);}
.sidebar-logo{padding:20px 18px 14px;border-bottom:1px solid var(--border);}
.sidebar-logo .brand{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted);margin-bottom:3px;}
.sidebar-logo .portal-name{font-size:14px;font-weight:700;color:var(--amber);}
.sidebar-section-label{padding:14px 18px 5px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);font-weight:600;}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 14px;margin:1px 6px;border-radius:7px;cursor:pointer;transition:background .15s;border:1px solid transparent;font-size:13px;font-weight:500;color:var(--text-muted);}
.nav-item:hover{background:var(--surface2);color:var(--text);}
.nav-item.active{background:var(--amber-glow);border-color:var(--amber-dim);color:var(--amber);}
.nav-item .nav-icon{font-size:14px;width:16px;text-align:center;}
.partner-item{display:flex;align-items:center;gap:9px;padding:8px 14px;margin:1px 6px;border-radius:7px;cursor:pointer;transition:background .15s;border:1px solid transparent;}
.partner-item:hover{background:var(--surface2);}
.partner-item.active{background:var(--amber-glow);border-color:var(--amber-dim);}
.partner-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.partner-item .p-name{font-size:13px;font-weight:500;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.partner-item.active .p-name{color:var(--amber);}
.partner-badge{font-size:10px;font-weight:700;padding:1px 5px;border-radius:4px;letter-spacing:.04em;}
.badge-vip{background:var(--amber-dim);color:var(--amber);}
.badge-lic{background:var(--yellow-dim);color:var(--yellow);}
.badge-block{background:var(--red-dim);color:var(--red);}
.badge-corp{background:var(--blue-dim);color:var(--blue);}
.badge-reorder{background:var(--yellow-dim);color:var(--yellow);}
hr.sidebar-divider{border:none;border-top:1px solid var(--border);margin:6px 0;}
.sidebar-footer{margin-top:auto;padding:12px 18px;border-top:1px solid var(--border);font-size:11px;color:var(--text-dim);}

/* ─── MAIN ─── */
#main{margin-left:var(--sidebar-w);flex:1;min-height:100vh;display:flex;flex-direction:column;}
.topbar{display:flex;align-items:center;gap:12px;padding:14px 24px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:50;}
.topbar-title{font-size:18px;font-weight:700;flex:1;}
.back-btn{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-muted);cursor:pointer;padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:transparent;transition:all .15s;}
.back-btn:hover{background:var(--surface2);color:var(--text);}
.topbar-meta{display:flex;align-items:center;gap:8px;}
.content{padding:24px;flex:1;}

/* ─── PILLS ─── */
.pill{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;letter-spacing:.03em;}
.pill-green{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3);}
.pill-amber{background:rgba(224,124,36,.15);color:var(--amber);border:1px solid rgba(224,124,36,.3);}
.pill-yellow{background:rgba(234,179,8,.15);color:var(--yellow);border:1px solid rgba(234,179,8,.3);}
.pill-red{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3);}
.pill-blue{background:rgba(59,130,246,.15);color:var(--blue);border:1px solid rgba(59,130,246,.3);}
.pill-grey{background:rgba(107,114,128,.15);color:var(--grey);border:1px solid rgba(107,114,128,.3);}
.pill-purple{background:rgba(168,85,247,.15);color:var(--purple);border:1px solid rgba(168,85,247,.3);}

/* ─── ALERTS ─── */
.alert{display:flex;align-items:flex-start;gap:10px;padding:12px 16px;border-radius:8px;margin-bottom:8px;font-size:13px;line-height:1.5;cursor:pointer;transition:opacity .15s;}
.alert:hover{opacity:.85;}
.alert-red{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:#fca5a5;}
.alert-yellow{background:rgba(234,179,8,.12);border:1px solid rgba(234,179,8,.3);color:#fde68a;}
.alert-icon{font-size:15px;flex-shrink:0;margin-top:1px;}

/* ─── KPI CARDS ─── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px;}
.kpi-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}
.kpi-value{font-size:22px;font-weight:700;color:var(--text);}
.kpi-value.amber{color:var(--amber);}
.kpi-value.green{color:var(--green);}
.kpi-value.red{color:var(--red);}
.kpi-value.yellow{color:var(--yellow);}
.kpi-sub{font-size:11px;color:var(--text-muted);margin-top:4px;}

/* ─── TWO-COL GRID ─── */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.panel-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.panel-title{font-size:13px;font-weight:600;color:var(--text);}
.panel-body{padding:0;}

/* ─── TABLES ─── */
.data-table{width:100%;border-collapse:collapse;font-size:13px;}
.data-table th{padding:9px 14px;text-align:left;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);border-bottom:1px solid var(--border);background:var(--surface2);}
.data-table td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle;}
.data-table tr:last-child td{border-bottom:none;}
.data-table tbody tr{cursor:pointer;}
.data-table tbody tr:hover{background:rgba(255,255,255,.03);}
.clickable-name{color:var(--amber);cursor:pointer;font-weight:500;}
.clickable-name:hover{text-decoration:underline;}

/* ─── MITM MINI LIST ─── */
.mitm-mini{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:20px;}
.mitm-mini-header{padding:12px 16px;border-bottom:1px solid var(--border);}
.mitm-mini-list{display:flex;flex-direction:column;}
.mitm-mini-row{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid var(--border);font-size:13px;}
.mitm-mini-row:last-child{border-bottom:none;}
.mitm-ep-num{font-size:11px;font-weight:700;color:var(--text-muted);width:36px;}
.mitm-ep-title{flex:1;font-weight:500;}
.mitm-ep-partner{color:var(--amber);cursor:pointer;font-size:12px;}
.mitm-ep-partner:hover{text-decoration:underline;}
.mitm-ep-status{margin-left:auto;}
.mitm-lic-block{color:var(--red);font-size:11px;margin-left:8px;}

/* ─── KANBAN ─── */
.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.kanban-col{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.kanban-col-header{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.kanban-col-title{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;}
.kanban-col-count{font-size:11px;font-weight:600;color:var(--text-muted);background:var(--surface2);padding:1px 7px;border-radius:10px;}
.kanban-cards{padding:10px;display:flex;flex-direction:column;gap:8px;}
.kanban-card{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:12px;transition:border-color .15s,box-shadow .15s;}
.kanban-card:hover{border-color:var(--amber-dim);box-shadow:0 2px 12px rgba(224,124,36,.08);}
.kc-ep{font-size:10px;font-weight:700;color:var(--text-muted);margin-bottom:4px;}
.kc-title{font-size:13px;font-weight:600;margin-bottom:6px;}
.kc-partner{font-size:12px;color:var(--amber);cursor:pointer;margin-bottom:8px;}
.kc-partner:hover{text-decoration:underline;}
.kc-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.kc-notes{font-size:11px;color:var(--text-muted);margin-top:6px;line-height:1.4;}
.kc-lic-block{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--red);margin-top:6px;}

/* Sales kanban cards */
.sc-title{font-size:13px;font-weight:600;margin-bottom:4px;}
.sc-value{font-size:16px;font-weight:700;color:var(--amber);margin-bottom:6px;}
.sc-meta{font-size:12px;color:var(--text-muted);display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px;}
.sc-notes{font-size:11px;color:var(--text-muted);line-height:1.4;}
.sc-due-red{color:var(--red);}
.sc-due-yellow{color:var(--yellow);}

/* Critical path rules */
.rules-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:20px;}
.rule-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;}
.rule-num{font-size:11px;font-weight:700;color:var(--amber);margin-bottom:6px;}
.rule-title{font-size:13px;font-weight:600;margin-bottom:6px;}
.rule-desc{font-size:12px;color:var(--text-muted);line-height:1.45;}

/* ─── PARTNER CRM VIEW ─── */
.partner-topbar{display:flex;align-items:center;gap:16px;padding:20px 24px;border-bottom:1px solid var(--border);background:var(--surface);}
.partner-avatar{width:44px;height:44px;border-radius:10px;background:var(--amber-glow);border:1px solid var(--amber-dim);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.partner-topbar-info{flex:1;}
.partner-topbar-name{font-size:20px;font-weight:700;margin-bottom:4px;}
.partner-topbar-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.meta-chip{font-size:11px;color:var(--text-muted);background:var(--surface2);padding:2px 8px;border-radius:5px;border:1px solid var(--border);}
.partner-stats{display:flex;gap:24px;margin-left:auto;text-align:right;}
.pstat-val{font-size:18px;font-weight:700;}
.pstat-val.red{color:var(--red);}
.pstat-val.green{color:var(--green);}
.pstat-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;}

/* Tabs */
.tabs-bar{display:flex;gap:2px;padding:0 24px;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;}
.tab-btn{padding:11px 16px;font-size:13px;font-weight:500;color:var(--text-muted);background:transparent;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .15s;white-space:nowrap;}
.tab-btn:hover{color:var(--text);}
.tab-btn.active{color:var(--amber);border-bottom-color:var(--amber);}
.tab-content{padding:24px;}
.tab-panel{display:none;}
.tab-panel.active{display:block;}

/* Overview tab */
.overview-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.info-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;}
.info-card h4{font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:12px;}
.info-row{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;gap:12px;}
.info-row:last-child{border-bottom:none;}
.info-key{color:var(--text-muted);flex-shrink:0;}
.info-val{text-align:right;font-weight:500;max-width:65%;}
.notes-box{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px;font-size:13px;color:var(--text-muted);line-height:1.6;margin-top:12px;}
.warn-note{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);border-radius:8px;padding:12px 14px;font-size:13px;color:#fca5a5;line-height:1.5;margin-bottom:12px;}

/* Locations tab */
.location-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:12px;}
.location-name{font-size:15px;font-weight:600;margin-bottom:4px;}
.location-addr{font-size:12px;color:var(--text-muted);margin-bottom:10px;}
.location-status{margin-bottom:12px;}
.products-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:10px;}
.products-table th{padding:7px 10px;text-align:left;font-size:10px;font-weight:600;color:var(--text-muted);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.06em;}
.products-table td{padding:7px 10px;border-bottom:1px solid var(--border);}
.products-table tr:last-child td{border-bottom:none;}
.no-product{font-size:12px;color:var(--text-muted);font-style:italic;margin-top:8px;}

/* Contacts tab */
.contact-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:10px;display:flex;align-items:flex-start;gap:14px;}
.contact-avatar{width:36px;height:36px;border-radius:8px;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.contact-info{flex:1;}
.contact-name{font-size:14px;font-weight:600;margin-bottom:2px;display:flex;align-items:center;gap:8px;}
.contact-role{font-size:12px;color:var(--text-muted);margin-bottom:8px;}
.contact-fields{display:flex;flex-direction:column;gap:4px;}
.contact-field{font-size:12px;display:flex;gap:6px;align-items:center;color:var(--text-muted);}
.contact-field span{color:var(--text);}
.contact-field a{color:var(--amber);}

/* Invoices tab */
.invoice-row{display:flex;align-items:center;gap:12px;padding:11px 14px;border-bottom:1px solid var(--border);font-size:13px;}
.invoice-row:last-child{border-bottom:none;}
.inv-id{font-family:monospace;font-size:12px;color:var(--amber);width:140px;flex-shrink:0;}
.inv-id:hover{text-decoration:underline;cursor:pointer;}
.inv-date{font-size:12px;color:var(--text-muted);width:80px;flex-shrink:0;}
.inv-amount{font-weight:700;width:90px;text-align:right;flex-shrink:0;}
.inv-amount.overdue{color:var(--red);}
.inv-items{flex:1;font-size:12px;color:var(--text-muted);line-height:1.4;}

/* Opportunities tab */
.opp-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:10px;cursor:pointer;transition:border-color .15s;}
.opp-card:hover{border-color:var(--amber-dim);}
.opp-card.expanded .opp-expand-body{display:block;}
.opp-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px;}
.opp-type-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.opp-title{font-size:14px;font-weight:600;flex:1;}
.opp-value{font-size:14px;font-weight:700;color:var(--amber);}
.opp-desc{font-size:13px;color:var(--text-muted);line-height:1.5;margin-bottom:8px;}
.opp-footer{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-muted);}
.opp-expand-body{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.opp-complete-btn{background:var(--surface3);border:1px solid var(--border2);color:var(--text-muted);font-size:11px;font-weight:600;padding:4px 10px;border-radius:5px;cursor:pointer;transition:all .15s;}
.opp-complete-btn:hover{border-color:var(--green);color:var(--green);}
.opp-complete-btn.done{border-color:var(--green);color:var(--green);}

/* Media tab */
.episode-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:16px;}
.episode-card h4{font-size:13px;font-weight:600;margin-bottom:4px;}
.episode-card .ep-status{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:13px;color:var(--text-muted);}
.episode-card a{color:var(--amber);font-size:13px;}
.episode-card a:hover{text-decoration:underline;}
.watch-btn{display:inline-flex;align-items:center;gap:6px;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:#fca5a5;font-size:12px;font-weight:600;padding:5px 12px;border-radius:6px;text-decoration:none;transition:background .15s;margin-top:8px;}
.watch-btn:hover{background:rgba(239,68,68,.2);text-decoration:none;}
.media-assets-table{width:100%;border-collapse:collapse;font-size:12px;}
.media-assets-table th{padding:8px 12px;text-align:left;font-size:10px;font-weight:600;color:var(--text-muted);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.06em;background:var(--surface2);}
.media-assets-table td{padding:9px 12px;border-bottom:1px solid var(--border);}
.media-assets-table tr:last-child td{border-bottom:none;}
.asset-status-live{color:var(--green);font-weight:600;}
.asset-status-blocked{color:var(--red);font-weight:600;}
.asset-status-pending{color:var(--yellow);font-weight:600;}
.asset-status-approved{color:var(--blue);font-weight:600;}

/* ─── VENDOR VIEW ─── */
.vendor-topbar{padding:20px 24px;border-bottom:1px solid var(--border);background:var(--surface);}
.vendor-topbar-name{font-size:20px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:10px;}
.vendor-topbar-type{font-size:13px;color:var(--text-muted);}
.vendor-topbar-loc{font-size:12px;color:var(--text-muted);margin-top:2px;}
.action-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:flex-start;gap:12px;}
.action-priority{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;flex-shrink:0;margin-top:2px;}
.action-title{font-size:13px;font-weight:600;margin-bottom:2px;}
.action-due{font-size:11px;color:var(--text-muted);}
.action-due.overdue{color:var(--red);}

/* ─── REVENUE VIEW ─── */
.rev-table{width:100%;border-collapse:collapse;font-size:13px;background:var(--surface);border-radius:10px;overflow:hidden;border:1px solid var(--border);}
.rev-table th{padding:10px 16px;text-align:left;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);border-bottom:1px solid var(--border);background:var(--surface2);}
.rev-table td{padding:11px 16px;border-bottom:1px solid var(--border);vertical-align:middle;}
.rev-table tr:last-child td{border-bottom:none;}
.rev-table tbody tr{cursor:pointer;}
.rev-table tbody tr:hover{background:rgba(255,255,255,.03);}
.rev-total-row td{font-weight:700;background:var(--surface2);border-top:1px solid var(--border2);}
.progress-bar{width:80px;height:6px;background:var(--surface3);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;border-radius:3px;background:var(--amber);}

/* ─── INVENTORY VIEW ─── */
.inv-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
.inv-item-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;}
.inv-item-card h4{font-size:14px;font-weight:600;margin-bottom:6px;}
.inv-item-card .supplier{font-size:12px;color:var(--text-muted);margin-bottom:10px;}
.inv-status-bar{display:flex;align-items:center;gap:8px;}
.status-indicator{width:10px;height:10px;border-radius:50%;flex-shrink:0;}

/* ─── RELATIONSHIP HEALTH ─── */
.health-section{margin-bottom:24px;}
.health-section h3{font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);padding:10px 0 8px;border-bottom:1px solid var(--border);margin-bottom:12px;}
.health-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:14px;margin-bottom:8px;}
.health-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.health-name{font-size:14px;font-weight:600;flex:1;}
.health-name.clickable{color:var(--amber);cursor:pointer;}
.health-name.clickable:hover{text-decoration:underline;}
.health-meta{font-size:12px;color:var(--text-muted);margin-right:auto;}
.health-flag{font-size:12px;color:var(--yellow);margin-right:12px;}
.health-flag.red{color:var(--red);}
.health-touch{font-size:12px;color:var(--text-muted);}

/* ─── PRODUCT CATALOG ─── */
.catalog-section{margin-bottom:28px;}
.catalog-section-title{font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);padding:8px 0;border-bottom:1px solid var(--border);margin-bottom:14px;}
.catalog-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.catalog-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;transition:border-color .15s;}
.catalog-card:hover{border-color:var(--amber-dim);}
.catalog-card-name{font-size:13px;font-weight:600;margin-bottom:4px;}
.catalog-card-price{font-size:14px;font-weight:700;color:var(--amber);margin-bottom:8px;}
.catalog-card-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
.catalog-partner-chip{font-size:10px;font-weight:600;padding:1px 7px;border-radius:10px;background:var(--amber-glow);color:var(--amber);border:1px solid var(--amber-dim);cursor:pointer;transition:background .15s;}
.catalog-partner-chip:hover{background:rgba(224,124,36,.25);}
.catalog-status-chip{font-size:10px;font-weight:600;padding:1px 7px;border-radius:10px;}
.catalog-status-active{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.25);}
.catalog-status-custom{background:rgba(59,130,246,.12);color:var(--blue);border:1px solid rgba(59,130,246,.25);}
.catalog-status-new{background:rgba(168,85,247,.12);color:var(--purple);border:1px solid rgba(168,85,247,.25);}
.catalog-status-disc{background:rgba(107,114,128,.12);color:var(--grey);border:1px solid rgba(107,114,128,.25);}

/* ─── PARTNER KANBAN VIEW ─── */
.partner-kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.pk-col{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.pk-col-header{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.pk-col-title{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;}
.pk-col-count{font-size:11px;font-weight:600;color:var(--text-muted);background:var(--surface2);padding:1px 7px;border-radius:10px;}
.pk-cards{padding:10px;display:flex;flex-direction:column;gap:8px;}
.pk-card{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:14px;cursor:pointer;transition:border-color .15s,box-shadow .15s;}
.pk-card:hover{border-color:var(--amber-dim);box-shadow:0 2px 14px rgba(224,124,36,.1);}
.pk-card-name{font-size:14px;font-weight:700;color:var(--amber);margin-bottom:4px;}
.pk-card-name:hover{text-decoration:underline;}
.pk-card-rev{font-size:13px;font-weight:600;color:var(--green);margin-bottom:3px;}
.pk-card-last{font-size:11px;color:var(--text-muted);margin-bottom:8px;}
.pk-card-meta{display:flex;flex-wrap:wrap;gap:5px;align-items:center;}

/* ─── MISC ─── */
.section-title{font-size:16px;font-weight:700;margin-bottom:16px;}
.empty-state{text-align:center;padding:40px;color:var(--text-muted);font-size:13px;}
.tag-hot{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3);font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;}
.tag-soon{background:rgba(234,179,8,.15);color:var(--yellow);border:1px solid rgba(234,179,8,.3);font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;}
.tag-later{background:rgba(107,114,128,.15);color:var(--grey);border:1px solid rgba(107,114,128,.3);font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;}
.dot-sep{color:var(--text-dim);margin:0 2px;}

/* Responsive kpi */
@media(max-width:900px){.kpi-grid{grid-template-columns:repeat(2,1fr);}.two-col{grid-template-columns:1fr;}.kanban{grid-template-columns:repeat(2,1fr);}.overview-grid{grid-template-columns:1fr;}.catalog-grid{grid-template-columns:repeat(2,1fr);}.partner-kanban{grid-template-columns:repeat(2,1fr);}}
</style>

let currentView = 'command';
let currentPartner = null;
let currentVendor = null;
let currentTab = {};

function showView(view, pid, vid) {
  currentView = view;
  currentPartner = pid || null;
  currentVendor = vid || null;

  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.partner-item').forEach(el => el.classList.remove('active'));

  if (view === 'command') document.getElementById('nav-cmd').classList.add('active');
  else if (view === 'kanban') document.getElementById('nav-kanban').classList.add('active');
  else if (view === 'mitm') document.getElementById('nav-mitm').classList.add('active');
  else if (view === 'sales') document.getElementById('nav-sales').classList.add('active');
  else if (view === 'revenue') document.getElementById('nav-revenue').classList.add('active');
  else if (view === 'inventory') document.getElementById('nav-inventory').classList.add('active');
  else if (view === 'health') document.getElementById('nav-health').classList.add('active');
  else if (view === 'catalog') document.getElementById('nav-catalog').classList.add('active');

  if (pid) {
    const el = document.getElementById('sidebar-p-'+pid);
    if (el) el.classList.add('active');
  }
  if (vid) {
    const el = document.getElementById('sidebar-v-'+vid);
    if (el) el.classList.add('active');
  }

  renderView();
}

function switchPartner(pid, tab) {
  if (!PARTNERS[pid]) return;
  showView('partner', pid);
  if (tab) {
    setTimeout(() => { showTab('partner-'+pid, tab); }, 10);
  }
}

function switchVendor(vid) {
  if (!VENDORS[vid]) return;
  showView('vendor', null, vid);
}

function renderView() {
  const root = document.getElementById('view-root');
  if (currentView === 'command') root.innerHTML = renderCommandCenter();
  else if (currentView === 'kanban') root.innerHTML = renderPartnerKanban();
  else if (currentView === 'mitm') root.innerHTML = renderMITM();
  else if (currentView === 'sales') root.innerHTML = renderSales();
  else if (currentView === 'partner' && currentPartner) root.innerHTML = renderPartner(PARTNERS[currentPartner]);
  else if (currentView === 'vendor' && currentVendor) root.innerHTML = renderVendor(VENDORS[currentVendor]);
  else if (currentView === 'revenue') root.innerHTML = renderRevenue();
  else if (currentView === 'inventory') root.innerHTML = renderInventory();
  else if (currentView === 'health') root.innerHTML = renderHealth();
  else if (currentView === 'catalog') root.innerHTML = renderCatalog();

  if (currentView === 'partner' || currentView === 'vendor') {
    const firstTab = document.querySelector('.tab-btn');
    if (firstTab) {
      const tabKey = currentView + '-' + (currentPartner || currentVendor);
      showTab(tabKey, firstTab.dataset.tab);
    }
  }
}

function showTab(key, tab) {
  currentTab[key] = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.dataset.tab === tab));
}

function toggleOpp(el) {
  el.closest('.opp-card').classList.toggle('expanded');
}

function markOppDone(btn) {
  btn.textContent = '✓ Marked Complete';
  btn.classList.add('done');
}

function fmt$(n) { return n == null ? '—' : '$' + n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function statusDot(status) {
  const map = {active:'#22c55e',watch:'#eab308',inactive:'#6b7280',prospect:'#3b82f6',blocked:'#ef4444'};
  return map[status] || '#6b7280';
}
function oppTypeColor(t) {
  const m = {hot:'#ef4444',upsell:'#e07c24',replace:'#3b82f6',newprod:'#a855f7'};
  return m[t] || '#6b7280';
}
function licPill(cls,text) {
  if (!cls) return '';
  const m = {red:'pill-red',yellow:'pill-yellow',green:'pill-green'};
  return `<span class="pill ${m[cls]||'pill-grey'}">${text}</span>`;
}
function dueCls(due) {
  if (!due) return '';
  if (due === 'OVERDUE') return 'sc-due-red';
  return 'sc-due-yellow';
}
function partnerName(pid) {
  const names = {q39:'Q39 BBQ',burntend:'Burnt End BBQ',meatmitch:'Meat Mitch BBQ',boothcreek:'Booth Creek Wagyu',dallasmavs:'Dallas Mavericks',gates:'Gates BBQ'};
  return names[pid] || pid;
}
function emailLink(e) {
  if (!e || e === '—' || e === '') return e || '—';
  return `<a href="mailto:${e}" style="color:var(--amber)">${e}</a>`;
}
function phoneLink(p) {
  if (!p || p === '—' || p === '') return p || '—';
  const digits = p.replace(/\D/g,'');
  return `<a href="tel:${digits}" style="color:var(--amber)">${p}</a>`;
}
function mapsLink(addr) {
  if (!addr || addr === '—' || addr === '') return addr || '—';
  return `<a href="https://maps.google.com/?q=${encodeURIComponent(addr)}" target="_blank" style="color:var(--amber)">${addr}</a>`;
}

function renderPartner(p) {
  const tabs = ['Overview','Locations','Products','Contacts','Invoices','Opportunities','Media & Campaigns'];
  const tabKey = 'partner-'+p.id;

  const tabBtns = tabs.map(t => `<button class="tab-btn" data-tab="${t}" onclick="showTab('${tabKey}','${t}')">${t}</button>`).join('');

  const products = buildProductsPanel(p);
  const contacts = buildContactsPanel(p);
  const invoices = buildInvoicesPanel(p);
  const opps = buildOppsPanel(p);
  const media = buildMediaPanel(p);

  const panels = [overview, locations, products, contacts, invoices, opps, media].map((html,i) =>
    `<div class="tab-panel" data-tab="${tabs[i]}">${html}</div>`
  ).join('');

  const hasOutstanding = p.outstandingBalance > 0;

  return `
    <div class="topbar">
      <button class="back-btn" onclick="showView('command')">← Back</button>
      <div class="topbar-title">${p.emoji} ${p.name}</div>

        <span class="pill ${p.statusPill}">${p.status}</span>
        ${p.tier === 'VIP' ? '<span class="meta-chip">⭐ VIP</span>' : `<span class="meta-chip">${p.tier}</span>`}
        <span class="meta-chip">${p.rid}</span>
        <span class="meta-chip">Since ${p.since}</span>
        <span class="meta-chip">${p.locationsCount} location${p.locationsCount !== 1 ? 's' : ''}</span>
      </div>
      <div class="partner-stats">
        <div>
          <div class="pstat-val green">${fmt$(p.lifetimeRevenue)}</div>
          <div class="pstat-label">Lifetime Rev</div>
        </div>
        <div>
          <div class="pstat-val ${hasOutstanding ? 'red' : ''}">${hasOutstanding ? fmt$(p.outstandingBalance) : '—'}</div>

      </div>

function buildOverviewPanel(p) {
  const licColor = p.licensingClass === 'red' ? 'var(--red)' : p.licensingClass === 'yellow' ? 'var(--yellow)' : 'var(--green)';
  const warnNote = p.outstandingBalance > 0
    ? `<div class="warn-note">⚠️ Outstanding balance: ${fmt$(p.outstandingBalance)} — follow up required.</div>` : '';
  const gateNote = p.testimonialGate
    ? `<div style="font-size:12px;color:var(--yellow);background:rgba(234,179,8,.08);border:1px solid rgba(234,179,8,.2);border-radius:6px;padding:8px 12px;margin-bottom:12px">🔒 Testimonial gate active — written approval required before any public quote</div>` : '';

  return `<div class="overview-grid">
    <div>
      ${warnNote}${gateNote}
      <div class="info-card">
        <h4>Account Summary</h4>
        <div class="info-row"><span class="info-key">Status</span><span class="info-val"><span class="pill ${p.statusPill}">${p.status}</span></span></div>
        <div class="info-row"><span class="info-key">Tier</span><span class="info-val">${p.tier}</span></div>
        <div class="info-row"><span class="info-key">Partner Since</span><span class="info-val">${p.since}</span></div>
        <div class="info-row"><span class="info-key">Locations</span><span class="info-val">${p.locationsCount}</span></div>
        <div class="info-row"><span class="info-key">Last Order</span><span class="info-val">${p.lastOrder}</span></div>
        <div class="info-row"><span class="info-key">Lifetime Revenue</span><span class="info-val" style="color:var(--green)">${fmt$(p.lifetimeRevenue)}</span></div>
        <div class="info-row"><span class="info-key">Outstanding</span><span class="info-val" style="color:${p.outstandingBalance > 0 ? 'var(--red)' : 'inherit'}">${p.outstandingBalance > 0 ? fmt$(p.outstandingBalance) : 'Clear'}</span></div>
        <div class="info-row"><span class="info-key">Media Assets</span><span class="info-val">${p.mediaAssetsOnFile} on file</span></div>
      </div>
    </div>
    <div>
      <div class="info-card">
        <h4>MITM Status</h4>
        <div class="info-row"><span class="info-key">Episode</span><span class="info-val">${p.mitm}</span></div>
        <div class="info-row"><span class="info-key">Stage</span><span class="info-val">${p.mitmStatus}</span></div>
        <div class="info-row"><span class="info-key">Licensing</span><span class="info-val" style="color:${licColor}">${p.licensing}</span></div>
      </div>
      <div class="info-card" style="margin-top:14px">
        <h4>Notes</h4>
        <div class="notes-box">${p.notes}</div>
      </div>
    </div>
  </div>`;
}

function buildLocationsPanel(p) {
  if (!p.locations || !p.locations.length) return `<div class="empty-state">No locations on file.</div>`;
  return p.locations.map(loc => {
    const products = loc.products && loc.products.length
      ? `<table class="products-table">
          <thead><tr><th>SKU</th><th>Product</th><th>Qty</th><th>Unit Price</th><th>Installed</th><th>Replace By</th></tr></thead>
          <tbody>${loc.products.map(pr => `<tr>
            <td style="font-family:monospace;font-size:11px;color:var(--text-muted)">${pr.sku}</td>
            <td>${pr.name}</td>
            <td>${pr.qty}</td>
            <td>${pr.unitPrice ? fmt$(pr.unitPrice) : '—'}</td>
            <td style="color:var(--text-muted)">${pr.installed}</td>
            <td style="color:${pr.replaceBy ? 'var(--yellow)' : 'var(--text-muted)'}">${pr.replaceBy || '—'}</td>
          </tr>`).join('')}</tbody>
        </table>`
      : `<p class="no-product">No GBC products installed at this location yet.</p>`;
    const flagPills = (loc.flags||[]).map(f => `<span class="pill pill-blue" style="font-size:10px;margin-right:4px">${f}</span>`).join('');
    const addrHtml = loc.address && loc.address !== '—' ? mapsLink(loc.address) : loc.address;
    const phoneHtml = loc.phone && loc.phone !== '—' && loc.phone !== '' ? ' · ' + phoneLink(loc.phone) : '';
    return `<div class="location-card">
      <div class="location-name">${loc.name} ${flagPills}</div>
      <div class="location-addr">${addrHtml}${phoneHtml}</div>
      <div class="location-status"><span class="pill ${loc.status.includes('Active') ? 'pill-green' : loc.status.includes('Opening') ? 'pill-blue' : 'pill-grey'}" style="font-size:10px">${loc.status}</span></div>
      ${products}
    </div>`;
  }).join('');
}

function buildProductsPanel(p) {
  const allProducts = (p.locations || []).flatMap(loc =>
    (loc.products||[]).map(pr => ({...pr, location: loc.name}))
  );
  if (!allProducts.length) return `<div class="empty-state">No products on file.</div>`;
  return `<div class="panel"><table class="data-table">
    <thead><tr><th>SKU</th><th>Product</th><th>Location</th><th>Qty</th><th>Unit Price</th><th>Installed</th><th>Replace By</th></tr></thead>
    <tbody>${allProducts.map(pr => `<tr>
      <td style="font-family:monospace;font-size:11px;color:var(--text-muted)">${pr.sku}</td>
      <td style="font-weight:500">${pr.name}</td>
      <td style="font-size:12px;color:var(--text-muted)">${pr.location}</td>
      <td>${pr.qty}</td>
      <td>${pr.unitPrice ? fmt$(pr.unitPrice) : '—'}</td>
      <td style="color:var(--text-muted)">${pr.installed}</td>
      <td style="color:${pr.replaceBy ? 'var(--yellow)' : 'var(--text-muted)'}">${pr.replaceBy || '—'}</td>
    </tr>`).join('')}</tbody>
  </table></div>`;
}

function buildContactsPanel(p) {
  if (!p.contacts || !p.contacts.length) return `<div class="empty-state">No contacts on file.</div>`;
  return p.contacts.map(c => `<div class="contact-card">
    <div class="contact-avatar">👤</div>
    <div class="contact-info">
      <div class="contact-name">
        ${c.name}
        ${c.primary ? '<span class="pill pill-green" style="font-size:10px">Primary</span>' : ''}
      </div>
      <div class="contact-role">${c.role}</div>
      <div class="contact-fields">
        ${c.email && c.email !== '—' && c.email !== '' ? `<div class="contact-field">📧 <span>${emailLink(c.email)}</span></div>` : ''}
        ${c.phone && c.phone !== '—' && c.phone !== '' ? `<div class="contact-field">📱 <span>${phoneLink(c.phone)}</span></div>` : ''}
        <div class="contact-field">💬 <span>${c.outreach}</span></div>
      </div>
    </div>
  </div>`).join('');
}

function buildInvoicesPanel(p) {
  if (!p.invoices || !p.invoices.length) return `<div class="empty-state">No invoices on file.</div>`;
  const total = p.invoices.filter(i => i.status === 'paid' && i.amount).reduce((s,i) => s+i.amount, 0);
  const outstanding = p.invoices.filter(i => i.status === 'overdue' && i.amount).reduce((s,i) => s+i.amount, 0);
  return `
    <div style="display:flex;gap:16px;margin-bottom:16px">
      <div class="info-card" style="flex:1;padding:12px 16px">
        <div class="kpi-label">Total Paid</div>
        <div style="font-size:18px;font-weight:700;color:var(--green)">${fmt$(total)}</div>
      </div>
      ${outstanding > 0 ? `<div class="info-card" style="flex:1;padding:12px 16px;border-color:var(--red-dim)">
        <div class="kpi-label">Overdue</div>
        <div style="font-size:18px;font-weight:700;color:var(--red)">${fmt$(outstanding)}</div>
      </div>` : ''}
    </div>
    <div class="panel">
      ${p.invoices.map(inv => {
        const stPill = inv.status === 'paid' ? 'pill-green' : inv.status === 'overdue' ? 'pill-red' : 'pill-grey';
        const sqLink = `https://squareup.com/dashboard/sales/transactions`;
        return `<div class="invoice-row">
          <a href="${sqLink}" target="_blank" class="inv-id" title="View in Square">${inv.id}</a>
          <span class="inv-date">${inv.date}</span>
          <span class="inv-amount ${inv.status === 'overdue' ? 'overdue' : ''}">${inv.amount != null ? fmt$(inv.amount) : 'Draft'}</span>
          <span class="inv-items">${inv.items}</span>
          <span class="pill ${stPill}" style="font-size:10px;flex-shrink:0">${inv.status}</span>
        </div>`;
      }).join('')}
    </div>`;
}

function buildOppsPanel(p) {
  if (!p.opportunities || !p.opportunities.length) return `<div class="empty-state">No opportunities on file.</div>`;
  return p.opportunities.map((o, idx) => `<div class="opp-card" onclick="toggleOpp(this)">
    <div class="opp-header">
      <div class="opp-type-dot" style="background:${oppTypeColor(o.type)}"></div>
      <div class="opp-title">${o.title}</div>
      <div class="opp-value">${o.value}</div>
    </div>
    <div class="opp-desc">${o.desc}</div>
    <div class="opp-footer">
      <span style="color:${oppTypeColor(o.type)};font-weight:600;font-size:11px;text-transform:uppercase">${o.type}</span>
      <span>·</span>
      <span>Owner: ${o.owner}</span>
      <span style="margin-left:auto;font-size:11px;color:var(--text-dim)">Click to expand ▼</span>
    </div>
    <div class="opp-expand-body">
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:10px;line-height:1.6">${o.desc}</div>
      <button class="opp-complete-btn" onclick="event.stopPropagation(); markOppDone(this)">Mark Complete</button>
    </div>
  </div>`).join('');
}

function buildMediaPanel(p) {
  const m = p.media;
  if (!m || !m.episode) {
    return `<div class="empty-state">No MITM episode assigned yet.</div>`;
  }
  let ytLink = '<span style="color:var(--text-muted)">URL TBD</span>';
  let watchBtn = '';
  if (m.url) {
    ytLink = `<a href="${m.url}" target="_blank">${m.url}</a>`;
    watchBtn = `<a href="${m.url}" target="_blank" class="watch-btn">▶ Watch Episode</a>`;
  }
  const epCard = `<div class="episode-card">
    <h4>${m.episode} — ${p.name}</h4>
    <div class="ep-status">
      <span class="pill ${m.epStatus === 'LIVE' ? 'pill-green' : m.epStatus === 'PRE-PROD' ? 'pill-amber' : 'pill-grey'}">${m.epStatus}</span>
      <span>${m.launchDate}</span>
      <span>·</span>
      ${ytLink}
    </div>
    ${watchBtn}
  </div>`;

  let assetsHtml = '';
  if (m.assets && m.assets.length) {
    const rows = m.assets.map(a => {
      const stCls = a.status === 'LIVE' ? 'asset-status-live' : a.status === 'BLOCKED' ? 'asset-status-blocked' : a.status === 'APPROVED' ? 'asset-status-approved' : 'asset-status-pending';
      let notesHtml = a.notes || '';
      if (a.url) {
        notesHtml = `<a href="${a.url}" target="_blank">${a.notes}</a>`;
      } else if (notesHtml.includes('youtu.be/2CNrRJxBfBA')) {
        notesHtml = notesHtml.replace('https://youtu.be/2CNrRJxBfBA', '<a href="https://youtu.be/2CNrRJxBfBA" target="_blank">youtu.be/2CNrRJxBfBA</a>');
      }
      return `<tr>
        <td style="font-weight:500">${a.type}</td>
        <td style="color:var(--text-muted)">${a.platform}</td>
        <td><span class="${stCls}">${a.status}</span></td>
        <td style="font-size:12px;color:var(--text-muted)">${notesHtml}</td>
      </tr>`;
    }).join('');
    assetsHtml = `<div class="panel" style="margin-top:16px">
      <div class="panel-header"><span class="panel-title">Content Assets</span></div>
      <table class="media-assets-table">
        <thead><tr><th>Asset Type</th><th>Platform</th><th>Status</th><th>Notes / Links</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  }

  return epCard + assetsHtml;
}

/* ══════════════════════════════════════════════════════════════════
   VENDOR VIEW
══════════════════════════════════════════════════════════════════ */
function renderVendor(v) {
  const tabs = ['Overview','Contacts','Open Actions'];
  const tabKey = 'vendor-'+v.id;
  const tabBtns = tabs.map(t => `<button class="tab-btn" data-tab="${t}" onclick="showTab('${tabKey}','${t}')">${t}</button>`).join('');

  const statusPills = {green:'pill-green',yellow:'pill-yellow',blue:'pill-blue',red:'pill-red'};
  const stPill = statusPills[v.statusClass] || 'pill-grey';

  const overviewHTML = `
    <div class="overview-grid">
      <div class="info-card">
        <h4>Vendor Details</h4>
        <div class="info-row"><span class="info-key">Type</span><span class="info-val">${v.type}</span></div>
        <div class="info-row"><span class="info-key">Status</span><span class="info-val"><span class="pill ${stPill}">${v.status}</span></span></div>
        ${v.location ? `<div class="info-row"><span class="info-key">Location</span><span class="info-val">${mapsLink(v.location)}</span></div>` : ''}
      </div>
      <div class="info-card">
        <h4>Notes</h4>
        <div class="notes-box">${v.notes}</div>
      </div>
    </div>`;

  const contactsHTML = v.contacts && v.contacts.length
    ? v.contacts.map(c => `<div class="contact-card">
        <div class="contact-avatar">👤</div>
        <div class="contact-info">
          <div class="contact-name">${c.name}</div>
          <div class="contact-role">${c.role}</div>
        </div>
      </div>`).join('')
    : `<div class="empty-state">No contacts on file.</div>`;

  const actionsHTML = v.actions && v.actions.length
    ? v.actions.map(a => {
        const prCls = a.priority === 'HOT' ? 'tag-hot' : a.priority === 'SOON' ? 'tag-soon' : 'tag-later';
        const dueCl = a.due === 'OVERDUE' ? 'overdue' : '';
        return `<div class="action-card">
          <span class="action-priority ${prCls}">${a.priority}</span>
          <div>
            <div class="action-title">${a.title}</div>
            <div class="action-due ${dueCl}">Due: ${a.due}</div>
          </div>
        </div>`;
      }).join('')
    : `<div class="empty-state">No open actions.</div>`;

  const panels = [overviewHTML, contactsHTML, actionsHTML].map((html,i) =>
    `<div class="tab-panel" data-tab="${tabs[i]}">${html}</div>`
  ).join('');

  return `
    <div class="topbar">
      <button class="back-btn" onclick="showView('command')">← Back</button>
      <div class="topbar-title">${v.emoji} ${v.name}</div>
      <div class="topbar-meta">
        <span class="pill ${stPill}">${v.status}</span>
        <span class="meta-chip">${v.type}</span>
        ${v.location ? `<span class="meta-chip">📍 ${v.location}</span>` : ''}
      </div>
    </div>
    <div class="tabs-bar">${tabBtns}</div>
    <div class="tab-content">${panels}</div>`;
}

/* ══════════════════════════════════════════════════════════════════
   REVENUE & MARGINS
══════════════════════════════════════════════════════════════════ */
function renderRevenue() {
  const totalRev = Object.values(PARTNERS).reduce((s,p) => s + p.lifetimeRevenue, 0);
  const rows = Object.values(PARTNERS).map(p => {
    const pct = (p.lifetimeRevenue / totalRev * 100).toFixed(1);
    return `<tr onclick="switchPartner('${p.id}')" style="cursor:pointer">
      <td><span class="clickable-name" onclick="switchPartner('${p.id}')">${p.name}</span></td>
      <td><span class="pill ${p.statusPill}" style="font-size:10px">${p.status}</span></td>
      <td style="font-weight:600;color:var(--green)">${fmt$(p.lifetimeRevenue)}</td>
      <td>${p.lastOrder}</td>
      <td style="color:${p.outstandingBalance > 0 ? 'var(--red)' : 'var(--text-muted)'}">${p.outstandingBalance > 0 ? fmt$(p.outstandingBalance) : '—'}</td>
      <td>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
          <span style="font-size:11px;color:var(--text-muted)">${pct}%</span>
        </div>
      </td>
    </tr>`;
  });

  const totalOut = Object.values(PARTNERS).reduce((s,p) => s + p.outstandingBalance, 0);

  return `
    <div class="topbar"><div class="topbar-title">💰 Revenue & Margins</div></div>
    <div class="content">
      <div class="kpi-grid" style="margin-bottom:20px">
        <div class="kpi-card"><div class="kpi-label">Total Lifetime Rev</div><div class="kpi-value amber">${fmt$(totalRev)}</div></div>
        <div class="kpi-card"><div class="kpi-label">Total Outstanding</div><div class="kpi-value red">${fmt$(totalOut)}</div></div>
        <div class="kpi-card"><div class="kpi-label">2026 Target</div><div class="kpi-value green">$163,500</div></div>
        <div class="kpi-card"><div class="kpi-label">Active Partners</div><div class="kpi-value">6</div></div>
      </div>
      <table class="rev-table">
        <thead><tr><th>Partner</th><th>Status</th><th>Lifetime Revenue</th><th>Last Order</th><th>Outstanding</th><th>Rev Share</th></tr></thead>
        <tbody>${rows.join('')}</tbody>
        <tr class="rev-total-row">
          <td colspan="2">Total</td>
          <td style="color:var(--green)">${fmt$(totalRev)}</td>
          <td>—</td>
          <td style="color:var(--red)">${fmt$(totalOut)}</td>
          <td>100%</td>
        </tr>
      </table>
    </div>`;
}

/* ══════════════════════════════════════════════════════════════════
   INVENTORY & REORDER
══════════════════════════════════════════════════════════════════ */
function renderInventory() {
  const items = [
    {name:"Richlite Sheets (Standard)",supplier:"Richlite / Brendan",status:"REORDER DUE",stCls:"yellow",contact:"Brendan",notes:"Reorder call overdue. Price change pending (Channy)."},
    {name:"Maple End Grain Blanks",supplier:"McCray Lumber",status:"FOLLOW-UP DUE",stCls:"yellow",contact:"McCray",notes:"Hardwood supplier. Follow-up overdue."},
    {name:"Hardwood Raw Stock",supplier:"Adeo Wood",status:"EVALUATING",stCls:"blue",contact:"TBD",notes:"New supplier + potential Richlite distribution partner."},
    {name:"Engraving Supplies",supplier:"Internal",status:"OK",stCls:"green",contact:"Matt",notes:""},
    {name:"Cutting Board Hardware",supplier:"Various",status:"OK",stCls:"green",contact:"Matt",notes:""}
  ];

  const cards = items.map(item => {
    const dotColor = item.stCls === 'yellow' ? 'var(--yellow)' : item.stCls === 'blue' ? 'var(--blue)' : item.stCls === 'red' ? 'var(--red)' : 'var(--green)';
    const pillCls = `pill-${item.stCls}`;
    return `<div class="inv-item-card">
      <h4>${item.name}</h4>
      <div class="supplier">${item.supplier}</div>
      <div class="inv-status-bar">
        <div class="status-indicator" style="background:${dotColor}"></div>
        <span class="pill ${pillCls}" style="font-size:10px">${item.status}</span>
      </div>
      ${item.notes ? `<div style="font-size:12px;color:var(--text-muted);margin-top:8px;line-height:1.4">${item.notes}</div>` : ''}
    </div>`;
  }).join('');

  return `
    <div class="topbar"><div class="topbar-title">📦 Inventory & Reorder</div></div>
    <div class="content">
      <div class="alert alert-yellow">
        <span class="alert-icon">⚠️</span>
        <div>Richlite reorder call overdue (Brendan). Price change confirmation pending (Channy). McCray follow-up overdue.</div>
      </div>
      <div class="inv-grid">${cards}</div>
      <div style="margin-top:8px">
        <div class="panel-header panel" style="border-radius:10px;padding:14px 18px">
          <span class="panel-title">Vendor Quick Actions</span>
        </div>
        ${Object.values(VENDORS).flatMap(v => v.actions.filter(a => a.priority === 'HOT').map(a => `
          <div class="action-card" style="margin-top:8px">
            <span class="action-priority tag-hot">HOT</span>
            <div>
              <div class="action-title">${v.name} — ${a.title}</div>
              <div class="action-due ${a.due === 'OVERDUE' ? 'overdue' : ''}">Due: ${a.due}</div>
            </div>
          </div>`)).join('')}
      </div>
    </div>`;
}

/* ══════════════════════════════════════════════════════════════════
   RELATIONSHIP HEALTH
══════════════════════════════════════════════════════════════════ */
function renderHealth() {
  const sections = [
    {key:'active',label:'Active',color:'var(--green)',desc:'Touched recently, no blockers'},
    {key:'watch',label:'Watch',color:'var(--yellow)',desc:'Need attention — blockers or gaps'},
    {key:'inactive',label:'Inactive',color:'var(--grey)',desc:'No recent activity'},
    {key:'prospect',label:'Prospects',color:'var(--blue)',desc:'Not yet partners'}
  ];

  const html = sections.map(s => {
    const items = LIFECYCLE.filter(l => l.status === s.key);
    if (!items.length) return '';
    const cards = items.map(l => {
      const isClickable = l.pid && PARTNERS[l.pid];
      const nameHtml = isClickable
        ? `<span class="health-name clickable" onclick="switchPartner('${l.pid}')">${l.name}</span>`
        : `<span class="health-name">${l.name}</span>`;
      const flagHtml = l.flag
        ? `<span class="health-flag ${l.flag.includes('block') || l.flag.includes('BLOCK') ? 'red' : ''}">${l.flag}</span>`
        : '';
      return `<div class="health-card">
        <div class="health-dot" style="background:${s.color}"></div>
        ${nameHtml}
        <span class="health-meta">${l.type}</span>
        ${flagHtml}
        <span class="health-touch">${l.lastTouch || '—'}</span>
      </div>`;
    }).join('');
    return `<div class="health-section">
      <h3 style="color:${s.color}">${s.label} <span style="font-size:11px;font-weight:400;color:var(--text-muted)">— ${s.desc}</span></h3>
      ${cards}
    </div>`;
  }).join('');

  return `
    <div class="topbar"><div class="topbar-title">🔄 Relationship Health</div></div>
    <div class="content">${html}</div>`;
}

/* ══════════════════════════════════════════════════════════════════
   PRODUCT CATALOG
══════════════════════════════════════════════════════════════════ */
function renderCatalog() {
  const totalProducts = CATALOG.reduce((s,c) => s + c.products.length, 0);

  const sectionsHtml = CATALOG.map(cat => {
    const cards = cat.products.map(prod => {
      const partnerChips = prod.partners.map(pid => {
        const name = partnerName(pid);
        return `<span class="catalog-partner-chip" onclick="switchPartner('${pid}')">${name}</span>`;
      }).join('');

      const statusCls = prod.status === 'active' ? 'catalog-status-active'
        : prod.status === 'custom' ? 'catalog-status-custom'
        : prod.status === 'new' ? 'catalog-status-new'
        : 'catalog-status-disc';
      const statusLabel = prod.status === 'active' ? 'Active'
        : prod.status === 'custom' ? 'Custom'
        : prod.status === 'new' ? 'New'
        : 'Discontinued';

      return `<div class="catalog-card">
        <div class="catalog-card-name">${prod.name}</div>
        <div class="catalog-card-price">${prod.price}</div>
        <div class="catalog-card-chips">
          <span class="catalog-status-chip ${statusCls}">${statusLabel}</span>
          ${partnerChips}
        </div>
        <div style="font-size:11px;color:var(--text-muted);line-height:1.4">${prod.desc}</div>
      </div>`;
    }).join('');

    return `<div class="catalog-section">
      <div class="catalog-section-title">${cat.cat} <span style="font-size:11px;font-weight:400;color:var(--text-dim)">(${cat.products.length} items)</span></div>
      <div class="catalog-grid">${cards}</div>
    </div>`;
  }).join('');

  return `
    <div class="topbar">
      <div class="topbar-title">📦 Product Catalog</div>
      <div style="font-size:12px;color:var(--text-muted)">${totalProducts} products · ${CATALOG.length} categories · Click partner chip → partner profile</div>
    </div>
    <div class="content">${sectionsHtml}</div>`;
}

/* ══════════════════════════════════════════════════════════════════
   SIDEBAR BUILD
══════════════════════════════════════════════════════════════════ */
function buildSidebar() {
  const partnerEl = document.getElementById('sidebar-partners');
  const partnerOrder = ['q39','burntend','meatmitch','boothcreek','dallasmavs','gates'];
  partnerEl.innerHTML = partnerOrder.map(pid => {
    const p = PARTNERS[pid];
    const badge = p.tier === 'VIP' ? `<span class="partner-badge badge-vip">VIP</span>`
      : p.tier === 'CORP' ? `<span class="partner-badge badge-corp">CORP</span>` : '';
    const blocked = p.status === 'Blocked' ? `<span class="partner-badge badge-block">BLK</span>` : '';
    const licWarn = (p.licensingClass === 'red' && p.id !== 'gates') ? `<span class="partner-badge badge-lic">LIC</span>` : '';
    return `<div class="partner-item" id="sidebar-p-${pid}" onclick="switchPartner('${pid}')">
      <div class="partner-dot" style="background:${p.dotColor}"></div>
      <span class="p-name">${p.name}</span>
      ${badge}${licWarn}${blocked}
    </div>`;
  }).join('');

  const vendorEl = document.getElementById('sidebar-vendors');
  const vendorOrder = ['richlite','jedunn','mccray','adeo','crystaldaisy'];
  vendorEl.innerHTML = vendorOrder.map(vid => {
    const v = VENDORS[vid];
    const reorder = v.status === 'REORDER DUE' ? `<span class="partner-badge badge-reorder">↺</span>` : '';
    return `<div class="partner-item" id="sidebar-v-${vid}" onclick="switchVendor('${vid}')">
      <span style="font-size:13px">${v.emoji}</span>
      <span class="p-name">${v.name}</span>
      ${reorder}
    </div>`;
  }).join('');
}

/* ══════════════════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════════════════ */
buildSidebar();
showView('command');
</script>
</body>
