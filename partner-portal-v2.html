<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GBC Partner Portal v2</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0d0d0d;--surface:#161616;--surface2:#1e1e1e;--surface3:#262626;
  --border:#2a2a2a;--border2:#333;
  --amber:#e07c24;--amber-dim:#7a4010;--amber-glow:rgba(224,124,36,.12);
  --green:#22c55e;--green-dim:#14532d;
  --red:#ef4444;--red-dim:#7f1d1d;
  --yellow:#eab308;--yellow-dim:#713f12;
  --blue:#3b82f6;--blue-dim:#1e3a8a;
  --purple:#a855f7;--purple-dim:#4a1772;
  --grey:#6b7280;--grey-dim:#1f2937;
  --text:#f5f5f5;--text-muted:#737373;--text-dim:#404040;
  --sidebar-w:240px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;}
a{color:var(--amber);text-decoration:none;}
a:hover{text-decoration:underline;}
button{font-family:inherit;cursor:pointer;}

/* ─── SIDEBAR ─── */
#sidebar{
  width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;overflow-y:auto;
}
#sidebar::-webkit-scrollbar{width:3px;}
#sidebar::-webkit-scrollbar-thumb{background:var(--border);}
.sidebar-logo{padding:20px 18px 14px;border-bottom:1px solid var(--border);}
.sidebar-logo .brand{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted);margin-bottom:3px;}
.sidebar-logo .portal-name{font-size:14px;font-weight:700;color:var(--amber);}
.sidebar-section-label{padding:14px 18px 5px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);font-weight:600;}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 14px;margin:1px 6px;border-radius:7px;cursor:pointer;transition:background .15s;border:1px solid transparent;font-size:13px;font-weight:500;color:var(--text-muted);}
.nav-item:hover{background:var(--surface2);color:var(--text);}
.nav-item.active{background:var(--amber-glow);border-color:var(--amber-dim);color:var(--amber);}
.nav-item .nav-icon{font-size:14px;width:16px;text-align:center;}
.partner-item{display:flex;align-items:center;gap:9px;padding:8px 14px;margin:1px 6px;border-radius:7px;cursor:pointer;transition:background .15s;border:1px solid transparent;}
.partner-item:hover{background:var(--surface2);}
.partner-item.active{background:var(--amber-glow);border-color:var(--amber-dim);}
.partner-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.partner-item .p-name{font-size:13px;font-weight:500;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.partner-item.active .p-name{color:var(--amber);}
.partner-badge{font-size:10px;font-weight:700;padding:1px 5px;border-radius:4px;letter-spacing:.04em;}
.badge-vip{background:var(--amber-dim);color:var(--amber);}
.badge-lic{background:var(--yellow-dim);color:var(--yellow);}
.badge-block{background:var(--red-dim);color:var(--red);}
.badge-corp{background:var(--blue-dim);color:var(--blue);}
.badge-reorder{background:var(--yellow-dim);color:var(--yellow);}
.badge-e5{background:var(--purple-dim);color:var(--purple);}
hr.sidebar-divider{border:none;border-top:1px solid var(--border);margin:6px 0;}
.sidebar-footer{margin-top:auto;padding:12px 18px;border-top:1px solid var(--border);font-size:11px;color:var(--text-dim);}

/* ─── MAIN ─── */
#main{margin-left:var(--sidebar-w);flex:1;min-height:100vh;display:flex;flex-direction:column;}
.topbar{display:flex;align-items:center;gap:12px;padding:14px 24px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:50;flex-wrap:wrap;}
.topbar-title{font-size:18px;font-weight:700;flex:1;}
.back-btn{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-muted);cursor:pointer;padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:transparent;transition:all .15s;}
.back-btn:hover{background:var(--surface2);color:var(--text);}
.topbar-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.content{padding:24px;flex:1;}

/* ─── PILLS ─── */
.pill{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;letter-spacing:.03em;}
.pill-green{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3);}
.pill-amber{background:rgba(224,124,36,.15);color:var(--amber);border:1px solid rgba(224,124,36,.3);}
.pill-yellow{background:rgba(234,179,8,.15);color:var(--yellow);border:1px solid rgba(234,179,8,.3);}
.pill-red{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3);}
.pill-blue{background:rgba(59,130,246,.15);color:var(--blue);border:1px solid rgba(59,130,246,.3);}
.pill-grey{background:rgba(107,114,128,.15);color:var(--grey);border:1px solid rgba(107,114,128,.3);}
.pill-purple{background:rgba(168,85,247,.15);color:var(--purple);border:1px solid rgba(168,85,247,.3);}

/* ─── ALERTS ─── */
.alert{display:flex;align-items:flex-start;gap:10px;padding:12px 16px;border-radius:8px;margin-bottom:8px;font-size:13px;line-height:1.5;cursor:pointer;transition:opacity .15s;}
.alert:hover{opacity:.85;}
.alert-red{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:#fca5a5;}
.alert-yellow{background:rgba(234,179,8,.12);border:1px solid rgba(234,179,8,.3);color:#fde68a;}
.alert-icon{font-size:15px;flex-shrink:0;margin-top:1px;}

/* ─── KPI CARDS ─── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px;}
.kpi-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}
.kpi-value{font-size:22px;font-weight:700;color:var(--text);}
.kpi-value.amber{color:var(--amber);}
.kpi-value.green{color:var(--green);}
.kpi-value.red{color:var(--red);}
.kpi-value.yellow{color:var(--yellow);}
.kpi-sub{font-size:11px;color:var(--text-muted);margin-top:4px;}

/* ─── TWO-COL GRID ─── */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.panel-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.panel-title{font-size:13px;font-weight:600;color:var(--text);}
.panel-body{padding:0;}

/* ─── TABLES ─── */
.data-table{width:100%;border-collapse:collapse;font-size:13px;}
.data-table th{padding:9px 14px;text-align:left;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);border-bottom:1px solid var(--border);background:var(--surface2);}
.data-table td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle;}
.data-table tr:last-child td{border-bottom:none;}
.data-table tbody tr{cursor:pointer;}
.data-table tbody tr:hover{background:rgba(255,255,255,.03);}
.clickable-name{color:var(--amber);cursor:pointer;font-weight:500;}
.clickable-name:hover{text-decoration:underline;}

/* ─── MITM MINI LIST ─── */
.mitm-mini{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:20px;}
.mitm-mini-header{padding:12px 16px;border-bottom:1px solid var(--border);}
.mitm-mini-list{display:flex;flex-direction:column;}
.mitm-mini-row{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid var(--border);font-size:13px;}
.mitm-mini-row:last-child{border-bottom:none;}
.mitm-ep-num{font-size:11px;font-weight:700;color:var(--text-muted);width:36px;}
.mitm-ep-title{flex:1;font-weight:500;}
.mitm-ep-partner{color:var(--amber);cursor:pointer;font-size:12px;}
.mitm-ep-partner:hover{text-decoration:underline;}
.mitm-ep-status{margin-left:auto;}
.mitm-lic-block{color:var(--red);font-size:11px;margin-left:8px;}

/* ─── KANBAN ─── */
.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.kanban-col{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.kanban-col-header{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.kanban-col-title{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;}
.kanban-col-count{font-size:11px;font-weight:600;color:var(--text-muted);background:var(--surface2);padding:1px 7px;border-radius:10px;}
.kanban-cards{padding:10px;display:flex;flex-direction:column;gap:8px;}
.kanban-card{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:12px;transition:border-color .15s,box-shadow .15s;}
.kanban-card:hover{border-color:var(--amber-dim);box-shadow:0 2px 12px rgba(224,124,36,.08);}
.kc-ep{font-size:10px;font-weight:700;color:var(--text-muted);margin-bottom:4px;}
.kc-title{font-size:13px;font-weight:600;margin-bottom:6px;}
.kc-partner{font-size:12px;color:var(--amber);cursor:pointer;margin-bottom:8px;}
.kc-partner:hover{text-decoration:underline;}
.kc-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.kc-notes{font-size:11px;color:var(--text-muted);margin-top:6px;line-height:1.4;}
.kc-lic-block{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--red);margin-top:6px;}

/* Sales kanban */
.sc-title{font-size:13px;font-weight:600;margin-bottom:4px;}
.sc-value{font-size:16px;font-weight:700;color:var(--amber);margin-bottom:6px;}
.sc-meta{font-size:12px;color:var(--text-muted);display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px;}
.sc-notes{font-size:11px;color:var(--text-muted);line-height:1.4;}
.sc-action{font-size:12px;color:var(--amber);margin-top:6px;font-weight:500;}
.sc-due-red{color:var(--red);}
.sc-due-yellow{color:var(--yellow);}
.sc-card-expand{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.sc-card-exp .sc-card-expand{display:block;}
.sales-kpi{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px;}
.sales-kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;}
.sales-kpi-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.sales-kpi-val{font-size:16px;font-weight:700;}
.sales-info-banner{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 14px;font-size:12px;color:var(--text-muted);margin-bottom:14px;}

/* Critical path rules */
.rules-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:20px;}
.rule-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;}
.rule-num{font-size:11px;font-weight:700;color:var(--amber);margin-bottom:6px;}
.rule-title{font-size:13px;font-weight:600;margin-bottom:6px;}
.rule-desc{font-size:12px;color:var(--text-muted);line-height:1.45;}

/* ─── PARTNER CRM VIEW ─── */
.partner-topbar{display:flex;align-items:flex-start;gap:16px;padding:20px 24px;border-bottom:1px solid var(--border);background:var(--surface);}
.partner-avatar{width:44px;height:44px;border-radius:10px;background:var(--amber-glow);border:1px solid var(--amber-dim);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.partner-topbar-info{flex:1;}
.partner-topbar-name{font-size:20px;font-weight:700;margin-bottom:4px;}
.partner-topbar-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.meta-chip{font-size:11px;color:var(--text-muted);background:var(--surface2);padding:2px 8px;border-radius:5px;border:1px solid var(--border);}
.partner-stats{display:flex;gap:24px;margin-left:auto;text-align:right;flex-shrink:0;}
.pstat-val{font-size:18px;font-weight:700;}
.pstat-val.red{color:var(--red);}
.pstat-val.green{color:var(--green);}
.pstat-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;}

/* Tabs */
.tabs-bar{display:flex;gap:2px;padding:0 24px;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;}
.tab-btn{padding:11px 16px;font-size:13px;font-weight:500;color:var(--text-muted);background:transparent;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .15s;white-space:nowrap;}
.tab-btn:hover{color:var(--text);}
.tab-btn.active{color:var(--amber);border-bottom-color:var(--amber);}
.tab-content{padding:24px;}
.tab-panel{display:none;}
.tab-panel.active{display:block;}

/* Overview tab */
.overview-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.info-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;}
.info-card h4{font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:12px;}
.info-row{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;gap:12px;}
.info-row:last-child{border-bottom:none;}
.info-key{color:var(--text-muted);flex-shrink:0;}
.info-val{text-align:right;font-weight:500;max-width:65%;}
.notes-box{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px;font-size:13px;color:var(--text-muted);line-height:1.6;margin-top:12px;}
.warn-note{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);border-radius:8px;padding:12px 14px;font-size:13px;color:#fca5a5;line-height:1.5;margin-bottom:12px;}

/* Priority Actions */
.priority-actions{margin-bottom:18px;}
.priority-action-card{background:var(--surface);border:1px solid var(--amber-dim);border-radius:10px;padding:14px 16px;margin-bottom:8px;cursor:pointer;transition:border-color .15s;}
.priority-action-card:hover{border-color:var(--amber);}
.pa-header{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.pa-fire{font-size:16px;}
.pa-title{font-size:13px;font-weight:600;flex:1;}
.pa-value{font-size:13px;font-weight:700;color:var(--amber);}
.pa-desc{font-size:12px;color:var(--text-muted);line-height:1.5;margin-bottom:6px;}
.pa-footer{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text-muted);}

/* Locations tab */
.location-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:12px;}
.location-name{font-size:15px;font-weight:600;margin-bottom:4px;}
.location-addr{font-size:12px;color:var(--text-muted);margin-bottom:10px;}
.location-status{margin-bottom:12px;}
.products-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:10px;}
.products-table th{padding:7px 10px;text-align:left;font-size:10px;font-weight:600;color:var(--text-muted);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.06em;}
.products-table td{padding:7px 10px;border-bottom:1px solid var(--border);}
.products-table tr:last-child td{border-bottom:none;}
.no-product{font-size:12px;color:var(--text-muted);font-style:italic;margin-top:8px;}

/* Contacts tab */
.contact-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:10px;display:flex;align-items:flex-start;gap:14px;}
.contact-avatar{width:36px;height:36px;border-radius:8px;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.contact-info{flex:1;}
.contact-name{font-size:14px;font-weight:600;margin-bottom:2px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.contact-role{font-size:12px;color:var(--text-muted);margin-bottom:8px;}
.contact-fields{display:flex;flex-direction:column;gap:4px;}
.contact-field{font-size:12px;display:flex;gap:6px;align-items:center;color:var(--text-muted);}
.contact-field span{color:var(--text);}
.contact-field a{color:var(--amber);}

/* Invoices tab */
.invoice-row{display:flex;align-items:center;gap:12px;padding:11px 14px;border-bottom:1px solid var(--border);font-size:13px;}
.invoice-row:last-child{border-bottom:none;}
.inv-id{font-family:monospace;font-size:12px;color:var(--amber);width:160px;flex-shrink:0;}
.inv-id:hover{text-decoration:underline;cursor:pointer;}
.inv-date{font-size:12px;color:var(--text-muted);width:80px;flex-shrink:0;}
.inv-amount{font-weight:700;width:90px;text-align:right;flex-shrink:0;}
.inv-amount.overdue{color:var(--red);}
.inv-items{flex:1;font-size:12px;color:var(--text-muted);line-height:1.4;}

/* Expenses tab */
.expense-row{display:flex;align-items:center;gap:12px;padding:11px 14px;border-bottom:1px solid var(--border);font-size:13px;}
.expense-row:last-child{border-bottom:none;}
.exp-id{font-family:monospace;font-size:12px;color:var(--purple);width:140px;flex-shrink:0;}
.exp-date{font-size:12px;color:var(--text-muted);width:80px;flex-shrink:0;}
.exp-amount{font-weight:700;width:90px;text-align:right;flex-shrink:0;color:var(--red);}
.exp-desc{flex:1;font-size:12px;color:var(--text-muted);line-height:1.4;}

/* Opportunities tab */
.opp-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:10px;cursor:pointer;transition:border-color .15s;}
.opp-card:hover{border-color:var(--amber-dim);}
.opp-card.expanded .opp-expand-body{display:block;}
.opp-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px;}
.opp-type-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.opp-title{font-size:14px;font-weight:600;flex:1;}
.opp-value{font-size:14px;font-weight:700;color:var(--amber);}
.opp-desc{font-size:13px;color:var(--text-muted);line-height:1.5;margin-bottom:8px;}
.opp-footer{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-muted);}
.opp-expand-body{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.opp-complete-btn{background:var(--surface3);border:1px solid var(--border2);color:var(--text-muted);font-size:11px;font-weight:600;padding:4px 10px;border-radius:5px;cursor:pointer;transition:all .15s;}
.opp-complete-btn:hover{border-color:var(--green);color:var(--green);}
.opp-complete-btn.done{border-color:var(--green);color:var(--green);}

/* Partner Intelligence tab */
.intel-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:12px;}
.intel-card h4{font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px;}
.intel-row{display:flex;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;align-items:flex-start;}
.intel-row:last-child{border-bottom:none;}
.intel-key{color:var(--text-muted);font-size:12px;width:120px;flex-shrink:0;}
.intel-val{color:var(--text);flex:1;line-height:1.5;}
.warning-intel{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);border-radius:8px;padding:10px 14px;font-size:12px;color:#fca5a5;line-height:1.5;margin-bottom:10px;}

/* Media tab */
.episode-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:16px;}
.episode-card h4{font-size:13px;font-weight:600;margin-bottom:4px;}
.episode-card .ep-status{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:13px;color:var(--text-muted);}
.episode-card a{color:var(--amber);font-size:13px;}
.episode-card a:hover{text-decoration:underline;}
.watch-btn{display:inline-flex;align-items:center;gap:6px;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:#fca5a5;font-size:12px;font-weight:600;padding:5px 12px;border-radius:6px;text-decoration:none;transition:background .15s;margin-top:8px;}
.watch-btn:hover{background:rgba(239,68,68,.2);text-decoration:none;}
.media-assets-table{width:100%;border-collapse:collapse;font-size:12px;}
.media-assets-table th{padding:8px 12px;text-align:left;font-size:10px;font-weight:600;color:var(--text-muted);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.06em;background:var(--surface2);}

.action-title{font-size:13px;font-weight:600;margin-bottom:2px;}
.action-due{font-size:11px;color:var(--text-muted);}
.action-due.overdue{color:var(--red);}

/* ─── REVENUE VIEW ─── */

.rev-table th{padding:10px 16px;text-align:left;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);border-bottom:1px solid var(--border);background:var(--surface2);}

.rev-table tbody tr{cursor:pointer;}
.rev-table tbody tr:hover{background:rgba(255,255,255,.03);}
.rev-total-row td{font-weight:700;background:var(--surface2);border-top:1px solid var(--border2);}
.progress-bar{width:80px;height:6px;background:var(--surface3);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;border-radius:3px;background:var(--amber);}

.catalog-section-title{font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);padding:8px 0;border-bottom:1px solid var(--border);margin-bottom:14px;}
.catalog-controls{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
.catalog-filter-btn{font-size:11px;font-weight:600;padding:5px 12px;border-radius:6px;border:1px solid var(--border2);background:var(--surface2);color:var(--text-muted);cursor:pointer;transition:all .15s;}

.catalog-toggle-btn{font-size:11px;font-weight:600;padding:5px 12px;border-radius:6px;border:1px solid var(--border2);background:var(--surface2);color:var(--text-muted);cursor:pointer;transition:all .15s;margin-left:auto;}

.catalog-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}

.catalog-card-sku{font-size:10px;font-family:monospace;color:var(--text-muted);margin-bottom:4px;}
.catalog-card-price{font-size:14px;font-weight:700;color:var(--amber);margin-bottom:8px;}

.catalog-status-material{background:rgba(107,114,128,.12);color:var(--grey);border:1px solid rgba(107,114,128,.25);}

.catalog-table td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
.catalog-table tr:last-child td{border-bottom:none;}

.pk-card{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:14px;cursor:pointer;transition:border-color .15s,box-shadow .15s;}

.pk-card-name{font-size:14px;font-weight:700;color:var(--amber);margin-bottom:4px;}

/* ─── P&L OVERVIEW ─── */

   KANBAN PERSISTENCE
══════════════════════════════════════════════════════════════════ */
const KANBAN_STORAGE_KEY = 'gbc-kanban-state-v2';

function loadKanbanState() {
  try { const raw = localStorage.getItem(KANBAN_STORAGE_KEY); return raw ? JSON.parse(raw) : null; }
  catch(e) { return null; }
}
function saveKanbanState(stageMap) {
  try { localStorage.setItem(KANBAN_STORAGE_KEY, JSON.stringify(stageMap)); } catch(e) {}
}
function resetKanbanState() {
  localStorage.removeItem(KANBAN_STORAGE_KEY);
  showView('kanban');
}
function getEffectiveKanbanStages() {
  const saved = loadKanbanState();
  const stages = {};
  Object.values(PARTNERS).forEach(p => {
    stages[p.id] = (saved && saved[p.id]) ? saved[p.id] : (p.kanbanStage || 'vip');
  });
  return stages;
}
function copyKanbanJSON() {
  const stages = getEffectiveKanbanStages();
  const snippet = JSON.stringify(stages, null, 2);
  navigator.clipboard.writeText(snippet).then(() => {
    const btn = document.getElementById('copy-kanban-btn');
    if (btn) { btn.textContent = '✓ Copied!'; setTimeout(() => { btn.textContent = '📋 Copy JSON Update'; }, 2000); }
  }).catch(() => { prompt('Copy this JSON:', snippet); });
}

let draggedPid = null;
function onCardDragStart(e, pid) {
  draggedPid = pid; e.dataTransfer.effectAllowed = 'move';
  e.currentTarget.classList.add('dragging');
}
function onCardDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.pk-col').forEach(c => c.classList.remove('drag-over'));
}
function onColDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; e.currentTarget.classList.add('drag-over'); }
function onColDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function onColDrop(e, colKey) {
  e.preventDefault(); e.currentTarget.classList.remove('drag-over');
  if (!draggedPid) return;
  if (PARTNERS[draggedPid]) PARTNERS[draggedPid].kanbanStage = colKey;
  const stages = getEffectiveKanbanStages();
  stages[draggedPid] = colKey;
  saveKanbanState(stages);
  draggedPid = null;
  showView('kanban');
}

let currentView = 'command';
let currentPartner = null;
let currentNetwork = null;
let currentTab = {};
let catalogView = 'table';
let catalogFilter = 'All';
let catalogChannelFilter = 'all';

function showView(view, pid, nid) {
  currentView = view;
  currentPartner = pid || null;
  currentNetwork = nid || null;

  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.partner-item').forEach(el => el.classList.remove('active'));

  const navMap = {command:'nav-cmd',kanban:'nav-kanban',sales:'nav-sales',pl:'nav-pl',metrics:'nav-metrics',catalog:'nav-catalog'};
  if (navMap[view]) document.getElementById(navMap[view]).classList.add('active');

  if (pid) { const el = document.getElementById('sidebar-p-'+pid); if (el) el.classList.add('active'); }
  if (nid) { const el = document.getElementById('sidebar-n-'+nid); if (el) el.classList.add('active'); }

  renderView();
}

function switchPartner(pid, tab) {
  if (!PARTNERS[pid]) return;
  showView('partner', pid);
  if (tab) setTimeout(() => { showTab('partner-'+pid, tab); }, 10);
}
function switchNetwork(nid, tab) {
  if (!NETWORK[nid]) return;
  showView('network', null, nid);
  if (tab) setTimeout(() => { showTab('network-'+nid, tab); }, 10);
}

function renderView() {
  const root = document.getElementById('view-root');
  if (currentView === 'command') root.innerHTML = renderCommandCenter();
  else if (currentView === 'kanban') root.innerHTML = renderPartnerKanban();
  else if (currentView === 'sales') root.innerHTML = renderSales();
  else if (currentView === 'pl') root.innerHTML = renderPL();
  else if (currentView === 'metrics') root.innerHTML = renderMetrics();
  else if (currentView === 'partner' && currentPartner) root.innerHTML = renderPartner(PARTNERS[currentPartner]);
  else if (currentView === 'network' && currentNetwork) root.innerHTML = renderNetworkEntity(NETWORK[currentNetwork]);
  else if (currentView === 'catalog') root.innerHTML = renderCatalog();

  if (currentView === 'partner' || currentView === 'network') {
    const firstTab = document.querySelector('.tab-btn');
    if (firstTab) {
      const tabKey = currentView + '-' + (currentPartner || currentNetwork);
      showTab(tabKey, firstTab.dataset.tab);
    }
  }
}

function showTab(key, tab) {
  currentTab[key] = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.dataset.tab === tab));
}
function toggleOpp(el) { el.closest('.opp-card').classList.toggle('expanded'); }
function markOppDone(btn) { btn.textContent = '✓ Marked Complete'; btn.classList.add('done'); }

function statusDot(status) { const map={active:'#22c55e',watch:'#eab308',inactive:'#6b7280',prospect:'#3b82f6',blocked:'#ef4444'}; return map[status]||'#6b7280'; }
function oppTypeColor(t) { const m={hot:'#ef4444',upsell:'#e07c24',replace:'#3b82f6',newprod:'#a855f7'}; return m[t]||'#6b7280'; }
function dueCls(due) { if (!due) return ''; if (due==='OVERDUE') return 'sc-due-red'; return 'sc-due-yellow'; }
function partnerName(pid) {
  if (PARTNERS[pid]) return PARTNERS[pid].name;
  const netMap={richlite:'Richlite Co.',mccray:'McCray Lumber',jedunn:'JE Dunn',pfg:'PFG',crystaldaisy:'Crystal Daisy',adeo:'Adeo Wood'};

function phoneLink(p) { if (!p||p==='—'||p==='') return p||'—'; const digits=p.replace(/\D/g,''); return `<a href="tel:${digits}">${p}</a>`; }
function mapsLink(addr) { if (!addr||addr==='—'||addr==='') return addr||'—'; return `<a href="https://maps.google.com/?q=${encodeURIComponent(addr)}" target="_blank">${addr}</a>`; }

        </div>`;
      }).join('');
    } else {
      const colPartners=Object.values(PARTNERS).filter(p=>stages[p.id]===col.key);

      cards=colPartners.map(p=>`<div class="pk-card" draggable="true" ondragstart="onCardDragStart(event,'${p.id}')" ondragend="onCardDragEnd(event)" onclick="if(!event.defaultPrevented) switchPartner('${p.id}')">

    return `<div class="pk-col" ${dropAttrs}>

}

    <div class="sales-kpi-card"><div class="sales-kpi-label">Warm — Nurture</div><div class="sales-kpi-val" style="color:var(--amber)">${PIPELINE_DEALS.warm.length} deals</div></div>
    <div class="sales-kpi-card"><div class="sales-kpi-label">Active Partners</div><div class="sales-kpi-val" style="color:var(--green)">6</div></div>
  </div>`;

  const infoBanner = `<div class="sales-info-banner">ℹ️ Click any card to expand details + contact info</div>`;

  const cols = [
    {key:'hot',label:'🔥 HOT',color:'var(--red)'},
    {key:'warm',label:'🟡 WARM',color:'var(--amber)'},
    {key:'cold',label:'⚫ COLD',color:'var(--grey)'}
  ];
  const colsHTML = cols.map(col=>{
    const deals=PIPELINE_DEALS[col.key]||[];
    const cards=deals.map(d=>{
      const contactInfo = (d.email||d.phone)?`
        <div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:12px;color:var(--text-muted)">
          ${d.contact?`<div>👤 ${d.contact}</div>`:''}
          ${d.email?`<div>📧 ${emailLink(d.email)}</div>`:''}
          ${d.phone?`<div>📱 ${phoneLink(d.phone)}</div>`:''}
        </div>`:'';
      return `<div class="kanban-card" onclick="this.classList.toggle('sc-card-exp')" style="cursor:pointer">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px">
          <div class="sc-title">${d.title}</div>
          <span class="pill pill-${col.key==='hot'?'red':col.key==='warm'?'amber':'grey'}" style="font-size:10px;flex-shrink:0">${d.category||''}</span>
        </div>
        <div class="sc-value">${d.value}</div>
        <div class="sc-meta">
          <span style="color:var(--text-muted)">${d.sector||''}</span>
          ${d.lastTouch?`<span style="color:var(--text-muted)">· ${d.lastTouch}</span>`:''}
        </div>
        <div class="sc-action" style="font-size:12px;color:var(--amber)">${d.action||''}</div>
        <div class="sc-card-expand">
          ${contactInfo}
        </div>
      </div>`;
    }).join('');
    return `<div class="kanban-col">
      <div class="kanban-col-header"><span class="kanban-col-title" style="color:${col.color}">${col.label}</span><span class="kanban-col-count">${deals.length}</span></div>
      <div class="kanban-cards">${cards||'<div style="padding:12px;font-size:12px;color:var(--text-muted)">No deals</div>'}</div>
    </div>`;
  }).join('');

  return `
    <div class="topbar"><div class="topbar-title">💰 Sales Pipeline</div></div>
    <div class="content">
      ${kpis}
      ${infoBanner}
      <div class="kanban" style="grid-template-columns:repeat(3,1fr)">${colsHTML}</div>
    </div>`;
}

function renderPartner(p) {
  const tabs = ['Overview','Locations','Products','Contacts','Invoices','Opportunities','Partner Intelligence','Media & Campaigns'];

  const tabBtns = tabs.map(t=>`<button class="tab-btn" data-tab="${t}" onclick="showTab('${tabKey}','${t}')">${t}</button>`).join('');
  const panels = [
    buildOverviewPanel(p),buildLocationsPanel(p),buildProductsPanel(p),
    buildContactsPanel(p),buildInvoicesPanel(p),buildOppsPanel(p),
    buildIntelPanel(p),buildMediaPanel(p)
  ].map((html,i)=>`<div class="tab-panel" data-tab="${tabs[i]}">${html}</div>`).join('');

  const hasOutstanding = p.outstandingBalance>0;
  const tierBadge = p.tier==='VIP'?'<span class="meta-chip">⭐ VIP</span>':p.tier==='CORP'?'<span class="meta-chip">🏢 CORP</span>':`<span class="meta-chip">${p.tier}</span>`;

        <div class="topbar-title">${p.emoji} ${p.name}</div>
        <div class="topbar-meta">
          <span class="pill ${p.statusPill}">${p.status}</span>
          ${tierBadge}
          <span class="meta-chip">${p.rid}</span>
          <span class="meta-chip">Since ${p.since}</span>
          <span class="meta-chip">${p.locationsCount} location${p.locationsCount!==1?'s':''}</span>
          ${licBadge}
          <a class="edit-gh-btn" href="https://github.com/matthewgbc/gbc-tools/edit/main/data/partners.json" target="_blank">✏️ Edit on GitHub</a>
        </div>
      </div>
      <div class="partner-stats">
        <div><div class="pstat-val green">${fmt$(p.lifetimeRevenue)}</div><div class="pstat-label">Lifetime Rev</div></div>
        <div><div class="pstat-val ${hasOutstanding?'red':''}">${hasOutstanding?fmt$(p.outstandingBalance):'—'}</div><div class="pstat-label">Outstanding</div></div>
        <div><div class="pstat-val">${p.since}</div><div class="pstat-label">Since</div></div>
        <div><div class="pstat-val">${p.locationsCount}</div><div class="pstat-label">Locations</div></div>

  const gateNote = p.testimonialGate?`<div style="font-size:12px;color:var(--yellow);background:rgba(234,179,8,.08);border:1px solid rgba(234,179,8,.2);border-radius:6px;padding:8px 12px;margin-bottom:12px">🔒 Testimonial gate active — written approval required before any public quote</div>`:'';

  const priorityActions = (p.opportunities||[]).slice(0,3).map(o=>`

      <div class="pa-desc">${o.desc}</div>
      <div class="pa-footer"><span>Owner: ${o.owner}</span></div>

  return `<div class="overview-grid">
    <div>
      ${warnNote}${gateNote}

      <div class="info-card">
        <h4>Account Summary</h4>
        <div class="info-row"><span class="info-key">Partner ID</span><span class="info-val">${p.rid}</span></div>
        <div class="info-row"><span class="info-key">Tier</span><span class="info-val">${p.tier}</span></div>
        <div class="info-row"><span class="info-key">Status</span><span class="info-val"><span class="pill ${p.statusPill}">${p.status}</span></span></div>
        <div class="info-row"><span class="info-key">Partner Since</span><span class="info-val">${p.since}</span></div>
        <div class="info-row"><span class="info-key">Locations</span><span class="info-val">${p.locationsCount}</span></div>
        <div class="info-row"><span class="info-key">Last Order</span><span class="info-val">${p.lastOrder}</span></div>
        <div class="info-row"><span class="info-key">Lifetime Revenue</span><span class="info-val" style="color:var(--green)">${fmt$(p.lifetimeRevenue)}</span></div>

        ${p.productValuePlaced?`<div class="info-row"><span class="info-key">Product Value Placed</span><span class="info-val">${fmt$(p.productValuePlaced)}</span></div>`:''}
        <div class="info-row"><span class="info-key">MITM Episode</span><span class="info-val">${p.mitm}</span></div>
        <div class="info-row"><span class="info-key">Licensing</span><span class="info-val" style="color:${licColor}">${p.licensing}</span></div>
        <div class="info-row"><span class="info-key">Testimonial Gate</span><span class="info-val">${p.testimonialGate?'🔒 ACTIVE':'—'}</span></div>
        <div class="info-row"><span class="info-key">Media Assets</span><span class="info-val">${p.mediaAssetsOnFile} on file</span></div>
      </div>
    </div>
    <div>
      <div class="info-card">
        <h4>Notes</h4>
        <div class="notes-box">${p.notes}</div>
      </div>
    </div>
  </div>`;
}

function buildLocationsPanel(p) {
  if (!p.locations||!p.locations.length) return `<div class="empty-state">No locations on file.</div>`;
  return p.locations.map(loc=>{
    const products=loc.products&&loc.products.length?`<table class="products-table">
        <thead><tr><th>SKU</th><th>Product</th><th>Qty</th><th>Unit Price</th><th>Installed</th><th>Replace By</th></tr></thead>
        <tbody>${loc.products.map(pr=>`<tr>
          <td style="font-family:monospace;font-size:11px;color:var(--text-muted)">${pr.sku}</td>
          <td>${pr.name}</td><td>${pr.qty}</td>
          <td>${pr.unitPrice?fmt$(pr.unitPrice):'—'}</td>
          <td style="color:var(--text-muted)">${pr.installed}</td>
          <td style="color:${pr.replaceBy?'var(--yellow)':'var(--text-muted)'}">${pr.replaceBy||'—'}</td>
        </tr>`).join('')}</tbody>
      </table>`:`<p class="no-product">No GBC products installed at this location yet.</p>`;
    const flagPills=(loc.flags||[]).map(f=>`<span class="pill pill-blue" style="font-size:10px;margin-right:4px">${f}</span>`).join('');
    const addrHtml=loc.address&&loc.address!=='—'?mapsLink(loc.address):loc.address;
    const phoneHtml=loc.phone&&loc.phone!==''?' · '+phoneLink(loc.phone):'';
    return `<div class="location-card">
      <div class="location-name">${loc.name} ${flagPills}</div>
      <div class="location-addr">${addrHtml}${phoneHtml}</div>
      <div class="location-status"><span class="pill ${loc.status.includes('Active')?'pill-green':loc.status.includes('Opening')?'pill-blue':'pill-grey'}" style="font-size:10px">${loc.status}</span></div>
      ${products}
    </div>`;
  }).join('');
}

function buildProductsPanel(p) {
  const allProducts=(p.locations||[]).flatMap(loc=>(loc.products||[]).map(pr=>({...pr,location:loc.name})));
  if (!allProducts.length) return `<div class="empty-state">No products on file.</div>`;
  return `<div class="panel"><table class="data-table">
    <thead><tr><th>SKU</th><th>Product</th><th>Location</th><th>Qty</th><th>Unit Price</th><th>Installed</th><th>Replace By</th></tr></thead>
    <tbody>${allProducts.map(pr=>`<tr>
      <td style="font-family:monospace;font-size:11px;color:var(--text-muted)">${pr.sku}</td>
      <td style="font-weight:500">${pr.name}</td>
      <td style="font-size:12px;color:var(--text-muted)">${pr.location}</td>
      <td>${pr.qty}</td>
      <td>${pr.unitPrice?fmt$(pr.unitPrice):'—'}</td>
      <td style="color:var(--text-muted)">${pr.installed}</td>
      <td style="color:${pr.replaceBy?'var(--yellow)':'var(--text-muted)'}">${pr.replaceBy||'—'}</td>
    </tr>`).join('')}</tbody>
  </table></div>`;
}

function buildContactsPanel(p) {
  if (!p.contacts||!p.contacts.length) return `<div class="empty-state">No contacts on file.</div>`;
  return p.contacts.map(c=>`<div class="contact-card">
    <div class="contact-avatar">👤</div>
    <div class="contact-info">
      <div class="contact-name">
        ${c.name}
        ${c.primary?'<span class="pill pill-green" style="font-size:10px">Primary</span>':''}
      </div>
      <div class="contact-role">${c.role}</div>
      <div class="contact-fields">
        ${c.email&&c.email!==''?`<div class="contact-field">📧 <span>${emailLink(c.email)}</span></div>`:''}
        ${c.phone&&c.phone!==''?`<div class="contact-field">📱 <span>${phoneLink(c.phone)}</span></div>`:''}
        <div class="contact-field">💬 <span>${c.outreach}</span></div>
      </div>
    </div>
  </div>`).join('');
}

function buildInvoicesPanel(p) {
  if (!p.invoices||!p.invoices.length) return `<div class="empty-state">No invoices on file.</div>`;
  const total=p.invoices.filter(i=>i.status==='paid'&&i.amount).reduce((s,i)=>s+i.amount,0);
  const outstanding=p.invoices.filter(i=>i.status==='overdue'&&i.amount).reduce((s,i)=>s+i.amount,0);
  return `
    <div style="display:flex;gap:16px;margin-bottom:16px">
      <div class="info-card" style="flex:1;padding:12px 16px"><div class="kpi-label">Total Paid</div><div style="font-size:18px;font-weight:700;color:var(--green)">${fmt$(total)}</div></div>
      ${outstanding>0?`<div class="info-card" style="flex:1;padding:12px 16px;border-color:var(--red-dim)"><div class="kpi-label">Overdue</div><div style="font-size:18px;font-weight:700;color:var(--red)">${fmt$(outstanding)}</div></div>`:''}
    </div>
    <div class="panel">
      ${p.invoices.map(inv=>{
        const stPill=inv.status==='paid'?'pill-green':inv.status==='overdue'?'pill-red':'pill-grey';
        return `<div class="invoice-row">
          <a href="https://squareup.com/dashboard/sales/transactions" target="_blank" class="inv-id">${inv.id}</a>
          <span class="inv-date">${inv.date}</span>

          <span class="inv-items">${inv.items}</span>

function buildIntelPanel(p) {
  const intel = p.intel;

  const socials = [
    intel.instagram&&`<div class="intel-row"><span class="intel-key">Instagram</span><span class="intel-val">${intel.instagram}</span></div>`,

    intel.tiktok&&`<div class="intel-row"><span class="intel-key">TikTok</span><span class="intel-val">${intel.tiktok}</span></div>`,
    intel.youtube&&`<div class="intel-row"><span class="intel-key">YouTube</span><span class="intel-val">${intel.youtube}</span></div>`

        ${intel.founder?`<div class="intel-card"><h4>Founder / Leadership</h4><div style="font-size:13px;line-height:1.6;color:var(--text-muted)">${intel.founder}</div></div>`:''}
      </div>
      <div>
        ${intel.agencies?`<div class="intel-card"><h4>Agencies / Partners</h4><div style="font-size:13px;line-height:1.6;color:var(--text-muted)">${intel.agencies}</div></div>`:''}

function buildMediaPanel(p) {
  const m=p.media;
  if (!m||!m.episode) return `<div class="empty-state">No MITM episode assigned yet.</div>`;
  let ytLink='<span style="color:var(--text-muted)">URL TBD</span>',watchBtn='';
  if (m.url&&m.url!=='#youtubeQ39') {
    ytLink=`<a href="${m.url}" target="_blank">${m.url}</a>`;
    watchBtn=`<a href="${m.url}" target="_blank" class="watch-btn">▶ Watch Episode</a>`;
  }
  const epCard=`<div class="episode-card">
    <h4>${m.episode} — ${p.name}</h4>
    <div class="ep-status">
      <span class="pill ${m.epStatus==='LIVE'?'pill-green':m.epStatus==='PRE-PROD'?'pill-amber':'pill-grey'}">${m.epStatus}</span>
      <span>${m.launchDate}</span><span>·</span>${ytLink}
    </div>${watchBtn}
  </div>`;

  let assetsHtml='';
  if (m.assets&&m.assets.length) {
    const rows=m.assets.map(a=>{
      const stCls=a.status==='LIVE'?'asset-status-live':a.status==='BLOCKED'?'asset-status-blocked':a.status==='APPROVED'?'asset-status-approved':'asset-status-pending';
      let notesHtml=a.notes||'';
      if (a.url) notesHtml=`<a href="${a.url}" target="_blank">${a.notes}</a>`;
      else if (notesHtml.includes('youtu.be/2CNrRJxBfBA')) notesHtml=notesHtml.replace('https://youtu.be/2CNrRJxBfBA','<a href="https://youtu.be/2CNrRJxBfBA" target="_blank">youtu.be/2CNrRJxBfBA</a>');
      return `<tr><td style="font-weight:500">${a.type}</td><td style="color:var(--text-muted)">${a.platform}</td><td><span class="${stCls}">${a.status}</span></td><td style="font-size:12px;color:var(--text-muted)">${notesHtml}</td></tr>`;
    }).join('');
    assetsHtml=`<div class="panel" style="margin-top:16px">
      <div class="panel-header"><span class="panel-title">Content Assets</span></div>
      <table class="media-assets-table"><thead><tr><th>Asset Type</th><th>Platform</th><th>Status</th><th>Notes / Links</th></tr></thead><tbody>${rows}</tbody></table>
    </div>`;
  }
  return epCard+assetsHtml;
}

  const statusPills={green:'pill-green',yellow:'pill-yellow',blue:'pill-blue',red:'pill-red'};
  const stPill=statusPills[n.statusClass]||'pill-grey';

  const overviewHTML=`<div class="overview-grid">
    <div class="info-card">
      <h4>Entity Details</h4>
      <div class="info-row"><span class="info-key">Type</span><span class="info-val">${n.type}</span></div>
      <div class="info-row"><span class="info-key">Status</span><span class="info-val"><span class="pill ${stPill}">${n.status}</span></span></div>
      ${n.location?`<div class="info-row"><span class="info-key">Location</span><span class="info-val">${mapsLink(n.location)}</span></div>`:''}
      ${n.website?`<div class="info-row"><span class="info-key">Website</span><span class="info-val"><a href="https://${n.website}" target="_blank">${n.website}</a></span></div>`:''}
    </div>
    <div class="info-card">
      <h4>Notes</h4>
      <div class="notes-box">${n.notes}</div>
    </div>
  </div>
  <div style="margin-top:16px">
    ${(n.actions||[]).map(a=>{
      const prCls=a.priority==='HOT'?'tag-hot':a.priority==='SOON'?'tag-soon':'tag-later';
      return `<div class="action-card">
        <span class="action-priority ${prCls}">${a.priority}</span>
        <div><div class="action-title">${a.title}</div><div class="action-due ${a.due==='OVERDUE'?'overdue':''}">Due: ${a.due}</div></div>
      </div>`;
    }).join('')}
  </div>`;

  const contactsHTML=n.contacts&&n.contacts.length
    ?n.contacts.map(c=>`<div class="contact-card">
      <div class="contact-avatar">👤</div>
      <div class="contact-info">
        <div class="contact-name">${c.name}${c.primary?'<span class="pill pill-green" style="font-size:10px">Primary</span>':''}</div>
        <div class="contact-role">${c.role}</div>
        <div class="contact-fields">
          ${c.email?`<div class="contact-field">📧 <span>${emailLink(c.email)}</span></div>`:''}
          ${c.phone?`<div class="contact-field">📱 <span>${phoneLink(c.phone)}</span></div>`:''}
        </div>
      </div>
    </div>`).join('')
    :`<div class="empty-state">No contacts on file.</div>`;

  const expensesHTML=n.expenses&&n.expenses.length?`<div class="panel">
    ${n.expenses.map(e=>`<div class="expense-row">
      <span class="exp-id">${e.id}</span>
      <span class="exp-date">${e.date}</span>
      <span class="exp-amount">${fmt$(e.amount)}</span>
      <span class="exp-desc">${e.desc}</span>
    </div>`).join('')}
  </div>`:`<div class="empty-state">No expenses on file.</div>`;

  const oppsHTML=n.intel&&n.intel.openOpp
    ?`<div class="opp-card">
      <div class="opp-header"><div class="opp-type-dot" style="background:var(--amber)"></div><div class="opp-title">Open Opportunities</div></div>
      <div class="opp-desc">${n.intel.openOpp}</div>
    </div>`
    :`<div class="empty-state">No opportunities specified.</div>`;

  const intelObj=n.intel||{};
  const intelRows=Object.entries(intelObj).filter(([k])=>k!=='openOpp').map(([k,v])=>
    `<div class="intel-row"><span class="intel-key">${k}</span><span class="intel-val">${v}</span></div>`
  ).join('');
  const intelHTML=intelRows?`<div class="intel-card"><h4>Intelligence</h4>${intelRows}</div>`:`<div class="empty-state">No intelligence on file.</div>`;

  const panels=[overviewHTML,contactsHTML,expensesHTML,oppsHTML,intelHTML].map((html,i)=>
    `<div class="tab-panel" data-tab="${tabs[i]}">${html}</div>`).join('');

  return `
    <div class="topbar">
      <button class="back-btn" onclick="showView('command')">← Back</button>
      <div class="topbar-title">${n.emoji} ${n.name}</div>
      <div class="topbar-meta">
        <span class="pill ${stPill}">${n.status}</span>
        <span class="meta-chip">${n.type}</span>
        ${n.location?`<span class="meta-chip">📍 ${n.location}</span>`:''}

      </div>
    </div>
    <div class="tabs-bar">${tabBtns}</div>
    <div class="tab-content">${panels}</div>`;
}

  const networkOrder = ['richlite','mccray','jedunn','pfg','crystaldaisy','adeo'];
  networkEl.innerHTML = networkOrder.map(nid => {
    const n = NETWORK[nid];
    const statusDot = n.statusClass==='green'?'#22c55e':n.statusClass==='yellow'?'#eab308':n.statusClass==='red'?'#ef4444':'#3b82f6';
    const hotBadge = n.statusClass==='red'?`<span class="partner-badge badge-block" style="background:rgba(239,68,68,.2)">HOT</span>`:'';
    return `<div class="partner-item" id="sidebar-n-${nid}" onclick="switchNetwork('${nid}')">
      <div class="partner-dot" style="background:${statusDot}"></div>
      <span class="p-name">${n.name}</span>
      ${hotBadge}
    </div>`;
  }).join('');
}

/* ══════════════════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════════════════ */
buildSidebar();
showView('command');
</script>
