<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GBC Partner Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0d0d0d;--surface:#161616;--surface2:#1e1e1e;--surface3:#262626;
  --border:#2a2a2a;--border2:#333;
  --amber:#e07c24;--amber-dim:#7a4010;--amber-glow:rgba(224,124,36,.12);
  --green:#22c55e;--green-dim:#14532d;
  --red:#ef4444;--red-dim:#7f1d1d;
  --yellow:#eab308;--yellow-dim:#713f12;
  --blue:#3b82f6;--blue-dim:#1e3a8a;
  --purple:#a855f7;--purple-dim:#4a1772;
  --text:#f5f5f5;--text-muted:#737373;--text-dim:#404040;
  --sidebar-w:240px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;}
a{color:inherit;text-decoration:none;}

/* ─── SIDEBAR ─── */
#sidebar{
  width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;overflow-y:auto;
}
#sidebar::-webkit-scrollbar{width:3px;}
#sidebar::-webkit-scrollbar-thumb{background:var(--border);}
.sidebar-logo{padding:20px 18px 14px;border-bottom:1px solid var(--border);}
.sidebar-logo .brand{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);margin-bottom:4px;}
.sidebar-logo .portal-name{font-size:15px;font-weight:700;color:var(--amber);}
.sidebar-section-label{padding:16px 18px 6px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);font-weight:600;}
.partner-item{display:flex;align-items:center;gap:10px;padding:9px 14px;margin:1px 6px;border-radius:8px;cursor:pointer;transition:background .15s;border:1px solid transparent;}
.partner-item:hover{background:var(--surface2);}
.partner-item.active{background:var(--amber-glow);border-color:var(--amber-dim);}
.partner-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.partner-item .p-name{font-size:13px;font-weight:500;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.partner-item.active .p-name{color:var(--amber);}
.partner-badge{font-size:10px;font-weight:700;padding:1px 5px;border-radius:4px;letter-spacing:.04em;}
.badge-vip{background:var(--amber-dim);color:var(--amber);}
.badge-warn{background:var(--yellow-dim);color:var(--yellow);}
.sidebar-divider{border:none;border-top:1px solid var(--border);margin:8px 0;}
.sidebar-footer{margin-top:auto;padding:12px 18px;border-top:1px solid var(--border);font-size:11px;color:var(--text-dim);}

/* ─── MAIN ─── */
#main{margin-left:var(--sidebar-w);flex:1;min-height:100vh;display:flex;flex-direction:column;}

/* ─── TOPBAR ─── */
#topbar{
  background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;
  height:58px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;
}
.partner-title{display:flex;align-items:center;gap:12px;}
.partner-title h1{font-size:18px;font-weight:700;}
.status-pill{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;letter-spacing:.05em;text-transform:uppercase;}
.pill-green{background:var(--green-dim);color:var(--green);}
.pill-amber{background:var(--amber-dim);color:var(--amber);}
.pill-red{background:var(--red-dim);color:var(--red);}
.pill-yellow{background:var(--yellow-dim);color:var(--yellow);}
.pill-blue{background:var(--blue-dim);color:var(--blue);}
.pill-grey{background:var(--surface3);color:var(--text-muted);}
.tier-chip{background:var(--amber-dim);color:var(--amber);font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;letter-spacing:.08em;text-transform:uppercase;}
.topbar-meta{font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:6px;}

/* ─── TABS ─── */
#tabs{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;display:flex;gap:2px;overflow-x:auto;}
#tabs::-webkit-scrollbar{height:0;}
.tab-btn{padding:10px 14px;font-size:13px;font-weight:500;color:var(--text-muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:color .15s,border-color .15s;white-space:nowrap;}
.tab-btn:hover{color:var(--text);}
.tab-btn.active{color:var(--amber);border-bottom-color:var(--amber);}

/* ─── CONTENT ─── */
#content{padding:24px 28px;flex:1;}

/* ─── METRICS ROW ─── */
.metrics-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.metric-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px;}
.metric-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;font-weight:600;}
.metric-value{font-size:22px;font-weight:700;color:var(--text);}
.metric-value.amber{color:var(--amber);}
.metric-value.green{color:var(--green);}
.metric-value.red{color:var(--red);}
.metric-sub{font-size:11px;color:var(--text-muted);margin-top:3px;}
.metric-sub.warning{color:var(--yellow);}
.metric-sub.danger{color:var(--red);}

/* ─── GATE / ALERT BANNER ─── */
.gate-banner{background:var(--red-dim);border:1px solid #7f1d1d;border-radius:8px;padding:10px 14px;font-size:12px;color:#fca5a5;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.warn-banner{background:var(--yellow-dim);border:1px solid #854d0e;border-radius:8px;padding:10px 14px;font-size:12px;color:#fde68a;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.info-banner{background:var(--blue-dim);border:1px solid #1e3a8a;border-radius:8px;padding:10px 14px;font-size:12px;color:#93c5fd;margin-bottom:12px;display:flex;align-items:center;gap:8px;}

/* ─── OVERVIEW 2-COL ─── */
.overview-two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:24px;}
.info-block{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;}
.info-block-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:12px;}
.info-row{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:1px solid var(--border);gap:12px;}
.info-row:last-child{border-bottom:none;}
.info-key{font-size:12px;color:var(--text-muted);}
.info-val{font-size:12px;font-weight:600;color:var(--text);text-align:right;}
.info-val.amber{color:var(--amber);}
.info-val.red{color:var(--red);}
.info-val.green{color:var(--green);}
.info-val.yellow{color:var(--yellow);}

/* ─── SECTION HEADERS ─── */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.section-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);}

/* ─── LOCATION CARDS ─── */
.locations-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px;margin-bottom:28px;}
.location-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.location-card-header{padding:14px 16px 10px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;}
.location-name{font-size:14px;font-weight:700;}
.location-address{font-size:11px;color:var(--text-muted);margin-top:2px;}
.location-card-body{padding:14px 16px;}

/* ─── PRODUCT ROWS ─── */
.product-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);}
.product-row:last-child{border-bottom:none;}
.product-info{flex:1;}
.product-name{font-size:12px;font-weight:600;}
.product-sku{font-size:10px;color:var(--text-muted);}
.product-qty{font-size:12px;font-weight:700;color:var(--text-muted);min-width:44px;text-align:center;}
.product-value{font-size:12px;font-weight:600;color:var(--amber);min-width:70px;text-align:right;}
.opp-flag{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;margin-left:6px;}
.flag-upsell{background:var(--blue-dim);color:var(--blue);}
.flag-replace{background:var(--yellow-dim);color:var(--yellow);}
.flag-new{background:var(--green-dim);color:var(--green);}

/* ─── TABLE WRAPPERS ─── */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:20px;}
.data-table{width:100%;border-collapse:collapse;}
.data-table th{text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text-dim);padding:10px 14px;border-bottom:1px solid var(--border);}
.data-table td{font-size:12px;padding:11px 14px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle;}
.data-table tr:last-child td{border-bottom:none;}
.data-table tr:hover td{background:rgba(255,255,255,.015);}

/* ─── INVOICE STATUS ─── */
.inv-status{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;text-transform:uppercase;letter-spacing:.05em;}
.inv-paid{background:var(--green-dim);color:var(--green);}
.inv-overdue{background:var(--red-dim);color:var(--red);}
.inv-pending{background:var(--yellow-dim);color:var(--yellow);}
.inv-draft{background:var(--surface3);color:var(--text-muted);}

/* ─── OPPORTUNITY CARDS ─── */
.opp-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;}
.opp-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;}
.opp-card.hot{border-left:3px solid var(--amber);}
.opp-card.upsell{border-left:3px solid var(--blue);}
.opp-card.replace{border-left:3px solid var(--yellow);}
.opp-card.newprod{border-left:3px solid var(--green);}
.opp-type{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}
.opp-card.hot .opp-type{color:var(--amber);}
.opp-card.upsell .opp-type{color:var(--blue);}
.opp-card.replace .opp-type{color:var(--yellow);}
.opp-card.newprod .opp-type{color:var(--green);}
.opp-title{font-size:13px;font-weight:700;margin-bottom:4px;}
.opp-desc{font-size:12px;color:var(--text-muted);line-height:1.5;}
.opp-value{margin-top:8px;font-size:13px;font-weight:700;color:var(--amber);}
.opp-owner{font-size:10px;color:var(--text-dim);margin-top:4px;}

/* ─── COVERAGE TABLE ─── */
.coverage-wrap{overflow-x:auto;}
.coverage-table{width:100%;border-collapse:collapse;font-size:12px;}
.coverage-table th{text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-dim);padding:9px 12px;border-bottom:1px solid var(--border);white-space:nowrap;}
.coverage-table td{padding:9px 12px;border-bottom:1px solid var(--border);}
.coverage-table tr:last-child td{border-bottom:none;}
.cell-check{text-align:center;}
.check-yes{color:var(--green);}
.check-no{color:var(--text-dim);}
.check-opp{color:var(--amber);}

/* ─── MEDIA TAB ─── */
.media-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;margin-bottom:20px;}
.media-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.media-card-thumb{height:140px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:40px;position:relative;}
.media-card-thumb .play-btn{position:absolute;width:44px;height:44px;background:rgba(224,124,36,.9);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;}
.media-card-body{padding:12px 14px;}
.media-card-title{font-size:13px;font-weight:600;margin-bottom:4px;}
.media-card-sub{font-size:11px;color:var(--text-muted);}
.media-card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px;}
.media-stat{font-size:11px;color:var(--text-dim);}
.media-link{font-size:11px;color:var(--amber);cursor:pointer;}
.media-link:hover{text-decoration:underline;}
.social-kit-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);}
.social-kit-row:last-child{border-bottom:none;}
.social-kit-platform{font-size:12px;font-weight:600;}
.social-kit-status{font-size:11px;color:var(--text-muted);}

/* ─── CONTACT CARD ─── */
.contact-name-cell{font-weight:600;}
.contact-primary-badge{font-size:10px;font-weight:700;color:var(--amber);text-transform:uppercase;letter-spacing:.06em;}
a.mailto{color:var(--amber);font-size:12px;}
a.mailto:hover{text-decoration:underline;}

/* ─── EMPTY STATE ─── */
.empty-state{text-align:center;padding:40px 20px;color:var(--text-dim);font-size:13px;}
</style>
</head>

// STATE
// ═══════════════════════════════════════════════
var current = 'q39';
var currentTab = 'overview';

// ═══════════════════════════════════════════════
// ROUTER
// ═══════════════════════════════════════════════
function switchPartner(pid) {
  current = pid;
  currentTab = 'overview';
  document.querySelectorAll('.partner-item').forEach(function(el) { el.classList.remove('active'); });
  document.getElementById('nav-' + pid).classList.add('active');
  renderTopbar();
  renderTabs();
  renderContent();
}

function switchTab(tab) {
  currentTab = tab;
  renderTabs();
  renderContent();
}

function renderTopbar() {
  var p = PARTNERS[current];
  document.getElementById('partner-heading').textContent = p.name;
  var s = document.getElementById('partner-status');
  s.textContent = p.status;
  s.className = 'status-pill ' + p.statusClass;
  document.getElementById('partner-tier').textContent = p.tier;
  document.getElementById('partner-id-label').textContent = p.id;
  document.getElementById('partner-since').textContent = 'Since ' + p.since;
  document.getElementById('partner-loc-count').textContent = p.locationsCount + ' Location' + (p.locationsCount !== 1 ? 's' : '');
}

function renderTabs() {
  document.querySelectorAll('.tab-btn').forEach(function(btn) {
    var t = btn.getAttribute('onclick').match(/'(\w+)'/);
    btn.classList.toggle('active', t && t[1] === currentTab);
  });
}

// ═══════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════
function fmt(n) {
  if (n == null) return '—';
  return '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function flagHtml(flags) {
  var map = { upsell: ['flag-upsell', 'UPSELL'], replace: ['flag-replace', 'REPLACE'], new: ['flag-new', 'NEW'] };
  return (flags || []).map(function(f) {
    if (!map[f]) return '';
    return '<span class="opp-flag ' + map[f][0] + '">' + map[f][1] + '</span>';
  }).join('');
}

function productRows(products) {
  if (!products || !products.length) return '<div class="empty-state" style="padding:16px;font-size:12px;">No GBC products placed here yet</div>';
  var totalVal = products.reduce(function(s, pr) { return s + pr.qty * pr.unitPrice; }, 0);
  var rows = products.map(function(pr) {
    return '<div class="product-row"><div class="product-info"><div class="product-name">' + pr.name + '</div>' +
      '<div class="product-sku">' + pr.sku + (pr.replaceBy ? ' · <span style="color:var(--yellow)">Replace ~' + pr.replaceBy + '</span>' : '') + ' · Installed ' + pr.installed + '</div></div>' +
      '<div class="product-qty">×' + pr.qty + '</div>' +
      '<div class="product-value">' + fmt(pr.qty * pr.unitPrice) + '</div></div>';
  }).join('');
  rows += '<div class="product-row" style="background:var(--surface2)"><div class="product-info"><div class="product-name" style="color:var(--text-muted)">Total placed value</div></div><div class="product-qty"></div><div class="product-value" style="font-size:13px;">' + fmt(totalVal) + '</div></div>';
  return rows;
}

function statusBadge(s) {
  var map = {
    'LIVE': 'pill-green', 'APPROVED': 'pill-green',
    'BLOCKED': 'pill-red', 'NOT SENT': 'pill-red',
    'PENDING': 'pill-yellow', 'PRE-PROD': 'pill-yellow', 'PLANNING': 'pill-yellow',
    'ON FILE': 'pill-blue', 'COLLAB OPPORTUNITY': 'pill-blue', 'CO-BRAND OPPORTUNITY': 'pill-blue',
    'NOT STARTED': 'pill-grey'
  };
  var cls = map[s] || 'pill-grey';
  return '<span class="status-pill ' + cls + '" style="font-size:10px;">' + s + '</span>';
}

// ═══════════════════════════════════════════════
// TAB RENDERERS
// ═══════════════════════════════════════════════
function renderOverview() {
  var p = PARTNERS[current];
  var totalPlaced = p.locations.reduce(function(sum, loc) {
    return sum + loc.products.reduce(function(s2, pr) { return s2 + pr.qty * pr.unitPrice; }, 0);
  }, 0);
  var oppPipeline = p.opportunities.reduce(function(s, o) {
    var n = o.value.replace(/[^0-9.]/g, '');
    return s + (n ? parseFloat(n) : 0);
  }, 0);

  var gate = p.testimonialGate
    ? '<div class="gate-banner">⚠️ TESTIMONIAL GATE ACTIVE — No public quotes from ' + p.name + ' without written sign-off.</div>'
    : '';
  var licBlock = p.licensingClass === 'red'
    ? '<div class="warn-banner">⚡ Licensing unsigned — <strong>blocking all short-form content + partner social distribution.</strong> Tim must get signature before content releases.</div>'
    : '';

  var licColor = p.licensingClass === 'red' ? 'red' : p.licensingClass === 'yellow' ? 'yellow' : 'green';

  return gate + licBlock +
    '<div class="metrics-row">' +
    '<div class="metric-card"><div class="metric-label">Lifetime Revenue</div><div class="metric-value amber">' + fmt(p.lifetimeRevenue) + '</div><div class="metric-sub">Last order: ' + p.lastOrder + '</div></div>' +
    '<div class="metric-card"><div class="metric-label">Outstanding Balance</div><div class="metric-value ' + (p.outstandingBalance > 0 ? 'red' : 'green') + '">' + (p.outstandingBalance > 0 ? fmt(p.outstandingBalance) : 'Clear') + '</div><div class="metric-sub ' + (p.outstandingBalance > 0 ? 'danger' : '') + '">' + (p.outstandingBalance > 0 ? 'Requires follow-up' : 'No open invoices') + '</div></div>' +
    '<div class="metric-card"><div class="metric-label">Product Value Placed</div><div class="metric-value amber">' + fmt(totalPlaced) + '</div><div class="metric-sub">Across ' + p.locationsCount + ' location' + (p.locationsCount !== 1 ? 's' : '') + '</div></div>' +
    '<div class="metric-card"><div class="metric-label">Open Opportunities</div><div class="metric-value">' + p.opportunities.length + '</div><div class="metric-sub warning">~' + fmt(oppPipeline) + ' est. pipeline</div></div>' +
    '</div>' +
    '<div class="overview-two-col">' +
    '<div class="info-block"><div class="info-block-title">Partner Summary</div>' +
    '<div class="info-row"><span class="info-key">Partner ID</span><span class="info-val">' + p.id + '</span></div>' +
    '<div class="info-row"><span class="info-key">Tier</span><span class="info-val amber">' + p.tier + '</span></div>' +
    '<div class="info-row"><span class="info-key">Status</span><span class="info-val">' + p.status + '</span></div>' +
    '<div class="info-row"><span class="info-key">Partner Since</span><span class="info-val">' + p.since + '</span></div>' +
    '<div class="info-row"><span class="info-key">Locations</span><span class="info-val">' + p.locationsCount + '</span></div>' +
    '<div class="info-row"><span class="info-key">MITM Episode</span><span class="info-val amber">' + p.mitm + '</span></div>' +
    '<div class="info-row"><span class="info-key">Licensing</span><span class="info-val ' + licColor + '">' + p.licensing + '</span></div>' +
    '<div class="info-row"><span class="info-key">Testimonial Gate</span><span class="info-val ' + (p.testimonialGate ? 'red' : 'green') + '">' + (p.testimonialGate ? 'ACTIVE — Approval Required' : 'Not required') + '</span></div>' +
    '<div class="info-row"><span class="info-key">Media Assets</span><span class="info-val">' + p.mediaAssetsOnFile + ' on file</span></div>' +
    '</div>' +
    '<div class="info-block"><div class="info-block-title">Notes</div><p style="font-size:12px;color:var(--text-muted);line-height:1.65;">' + p.notes + '</p></div>' +
    '</div>';
}

function renderLocations() {
  var p = PARTNERS[current];
  return '<div class="section-header"><div class="section-title">' + p.locationsCount + ' Location' + (p.locationsCount !== 1 ? 's' : '') + '</div></div>' +
    '<div class="locations-grid">' +
    p.locations.map(function(loc) {
      return '<div class="location-card">' +
        '<div class="location-card-header"><div><div class="location-name">' + loc.name + '</div>' +
        '<div class="location-address">' + loc.address + '</div>' +
        (loc.phone !== '—' ? '<div class="location-address">' + loc.phone + '</div>' : '') +
        '</div><div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">' + flagHtml(loc.flags) + '</div></div>' +
        '<div class="location-card-body">' +
        '<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-dim);margin-bottom:6px;">Status: <span style="color:var(--text-muted);text-transform:none;">' + loc.status + '</span></div>' +
        '<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-dim);margin-bottom:8px;">GBC Products</div>' +
        productRows(loc.products) +
        '</div></div>';
    }).join('') +
    '</div>';
}

function renderProducts() {
  var p = PARTNERS[current];
  var allSkus = {};
  p.locations.forEach(function(loc) {
    loc.products.forEach(function(pr) {
      if (!allSkus[pr.sku]) allSkus[pr.sku] = pr.name;
    });
  });
  var skuList = Object.keys(allSkus);
  if (!skuList.length) return '<div class="empty-state">No products placed with this partner yet.</div>';

  var headerCols = p.locations.map(function(l) {
    return '<th>' + (l.name.split('—')[1] || l.name).trim() + '</th>';
  }).join('');

  var bodyRows = skuList.map(function(sku) {
    var name = allSkus[sku];
    var totalQty = 0, totalVal = 0;
    var cells = p.locations.map(function(loc) {
      var pr = loc.products.filter(function(x) { return x.sku === sku; })[0];
      if (pr) {
        totalQty += pr.qty;
        totalVal += pr.qty * pr.unitPrice;
        return '<td class="cell-check"><span class="check-yes">✓</span> <span style="color:var(--text-muted);font-size:11px;">×' + pr.qty + '</span></td>';
      }
      return '<td class="cell-check"><span class="check-opp" title="Opportunity">○</span></td>';
    }).join('');
    return '<tr><td style="font-weight:600;">' + name + '</td><td style="color:var(--text-muted);">' + sku + '</td>' + cells +
      '<td style="font-weight:700;">' + totalQty + '</td>' +
      '<td style="font-weight:700;color:var(--amber);">' + fmt(totalVal) + '</td></tr>';
  }).join('');

  return '<div class="section-header"><div class="section-title">Product Coverage by Location</div></div>' +
    '<div class="table-wrap coverage-wrap" style="margin-bottom:16px;">' +
    '<table class="coverage-table"><thead><tr><th>Product</th><th>SKU</th>' + headerCols +
    '<th>Total Qty</th><th>Total Value</th></tr></thead><tbody>' + bodyRows + '</tbody></table></div>' +
    '<div style="font-size:11px;color:var(--text-dim);margin-top:4px;"><span style="color:var(--green);">✓</span> = Placed &nbsp;&nbsp;<span style="color:var(--amber);">○</span> = Opportunity</div>';
}

function renderContacts() {
  var p = PARTNERS[current];
  return '<div class="table-wrap"><table class="data-table"><thead><tr>' +
    '<th>Name</th><th>Role</th><th>Email</th><th>Phone</th><th>Best Outreach</th>' +
    '</tr></thead><tbody>' +
    p.contacts.map(function(c) {
      return '<tr><td><div class="contact-name-cell">' + c.name + '</div>' +
        (c.primary ? '<div class="contact-primary-badge">Primary</div>' : '') +
        '</td><td style="color:var(--text-muted);">' + c.role + '</td>' +
        '<td>' + (c.email !== '—' ? '<a class="mailto" href="mailto:' + c.email + '">' + c.email + '</a>' : '<span style="color:var(--text-dim);">—</span>') + '</td>' +
        '<td style="color:var(--text-muted);">' + c.phone + '</td>' +
        '<td style="color:var(--text-muted);">' + c.outreach + '</td></tr>';
    }).join('') +
    '</tbody></table></div>';
}

function renderInvoices() {
  var p = PARTNERS[current];
  var paid = p.invoices.filter(function(i) { return i.status === 'paid'; }).reduce(function(s, i) { return s + (i.amount || 0); }, 0);
  var overdue = p.invoices.filter(function(i) { return i.status === 'overdue'; }).reduce(function(s, i) { return s + (i.amount || 0); }, 0);

  return '<div class="metrics-row" style="grid-template-columns:repeat(3,1fr);margin-bottom:20px;">' +
    '<div class="metric-card"><div class="metric-label">Total Paid</div><div class="metric-value green">' + fmt(paid) + '</div></div>' +
    '<div class="metric-card"><div class="metric-label">Outstanding / Overdue</div><div class="metric-value ' + (overdue > 0 ? 'red' : 'green') + '">' + (overdue > 0 ? fmt(overdue) : 'None') + '</div>' +
    (overdue > 0 ? '<div class="metric-sub danger">Requires follow-up</div>' : '') + '</div>' +
    '<div class="metric-card"><div class="metric-label">Invoices on File</div><div class="metric-value">' + p.invoices.length + '</div></div>' +
    '</div>' +
    '<div class="table-wrap"><table class="data-table"><thead><tr>' +
    '<th>Invoice #</th><th>Date</th><th>Items</th><th>Amount</th><th>Status</th>' +
    '</tr></thead><tbody>' +
    p.invoices.map(function(inv) {
      return '<tr><td style="font-weight:600;color:var(--amber);">' + inv.id + '</td>' +
        '<td>' + inv.date + '</td>' +
        '<td style="color:var(--text-muted);">' + inv.items + '</td>' +
        '<td style="font-weight:600;">' + fmt(inv.amount) + '</td>' +
        '<td><span class="inv-status inv-' + inv.status + '">' + inv.status.toUpperCase() + '</span></td></tr>';
    }).join('') +
    '</tbody></table></div>';
}

function renderOpportunities() {
  var p = PARTNERS[current];
  return '<div class="section-header"><div class="section-title">' + p.opportunities.length + ' Open Opportunities</div></div>' +
    '<div class="opp-cards">' +
    p.opportunities.map(function(o) {
      var typeLabel = o.type === 'hot' ? '🔥 Priority Action' : o.type === 'upsell' ? '↑ Upsell' : o.type === 'replace' ? '↻ Replacement' : '＋ New Product / Location';
      return '<div class="opp-card ' + o.type + '">' +
        '<div class="opp-type">' + typeLabel + '</div>' +
        '<div class="opp-title">' + o.title + '</div>' +
        '<div class="opp-desc">' + o.desc + '</div>' +
        '<div class="opp-value">' + o.value + '</div>' +
        '<div class="opp-owner">Owner: ' + o.owner + '</div>' +
        '</div>';
    }).join('') +
    '</div>';
}

function renderMedia() {
  var p = PARTNERS[current];
  var m = p.media;
  if (!m) return '<div class="empty-state">No media data for this partner yet.</div>';

  var epStatusClass = { 'LIVE': 'pill-green', 'POST-LAUNCH': 'pill-green', 'PRE-PROD': 'pill-yellow', 'PLANNING': 'pill-yellow', 'BLOCKED': 'pill-red' }[m.episode.status] || 'pill-grey';

  var html = '';

  // Episode Feature Card
  html += '<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:20px;display:grid;grid-template-columns:1fr 2fr;gap:16px;">';
  html += '<div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:48px;min-height:120px;">' + m.episode.thumbnail + '</div>';
  html += '<div>';
  html += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;"><span style="font-size:16px;font-weight:700;">' + m.episode.title + '</span><span class="status-pill ' + epStatusClass + '">' + m.episode.status + '</span></div>';
  html += '<div style="font-size:12px;color:var(--text-muted);margin-bottom:6px;">' + m.episode.num + ' · ' + m.episode.date + '</div>';
  if (m.episode.url) {
    html += '<a href="' + m.episode.url + '" target="_blank" style="display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--amber);margin-top:4px;">▶ Watch on YouTube →</a>';
  } else {
    html += '<div style="font-size:12px;color:var(--text-dim);margin-top:4px;">Not yet published</div>';
  }
  html += '</div></div>';

  // Asset status table
  if (m.assets && m.assets.length) {
    html += '<div class="section-header" style="margin-bottom:12px;"><div class="section-title">Content Assets</div></div>';
    html += '<div class="table-wrap"><table class="data-table"><thead><tr><th>Asset Type</th><th>Platform</th><th>Status</th><th>Notes</th></tr></thead><tbody>';
    m.assets.forEach(function(a) {
      html += '<tr><td style="font-weight:600;">' + a.type + '</td><td style="color:var(--text-muted);">' + a.platform + '</td><td>' + statusBadge(a.status) + '</td><td style="color:var(--text-muted);">' + a.notes + '</td></tr>';
    });
    html += '</tbody></table></div>';
  }

  // Social channels
  if (m.social && m.social.length) {
    html += '<div class="section-header" style="margin-top:20px;margin-bottom:12px;"><div class="section-title">Social Channels</div></div>';
    html += '<div class="table-wrap"><table class="data-table"><thead><tr><th>Platform</th><th>Handle</th><th>Status</th></tr></thead><tbody>';
    m.social.forEach(function(s) {
      var cls = s.status === 'LIVE' ? 'pill-green' : s.status.includes('PENDING') || s.status.includes('BLOCKED') ? 'pill-red' : 'pill-blue';
      html += '<tr><td style="font-weight:600;">' + s.platform + '</td><td style="color:var(--text-muted);">' + s.handle + '</td><td><span class="status-pill ' + cls + '" style="font-size:10px;">' + s.status + '</span></td></tr>';
    });
    html += '</tbody></table></div>';
  }

  // Notes
  if (m.notes) {
    html += '<div class="info-block" style="margin-top:20px;"><div class="info-block-title">Media Notes</div><p style="font-size:12px;color:var(--text-muted);line-height:1.65;">' + m.notes + '</p></div>';
  }

  return html;
}

// ═══════════════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════════════
function renderContent() {
  var map = {
    overview: renderOverview,
    locations: renderLocations,
    products: renderProducts,
    contacts: renderContacts,
    invoices: renderInvoices,
    opportunities: renderOpportunities,
    media: renderMedia
  };
  document.getElementById('content').innerHTML = (map[currentTab] || renderOverview)();
}

// INIT
renderTopbar();
renderTabs();
renderContent();
</script>
</body>
</html>
